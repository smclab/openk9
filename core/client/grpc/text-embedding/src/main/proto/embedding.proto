syntax = "proto3";

option java_package = "io.openk9.ml.grpc";

import "google/protobuf/struct.proto";

package embedding;

service Embedding {
  // v1, text-only. DEPRECATED: removed in Phase 2 once all consumers migrate.
  rpc GetMessages(EmbeddingRequest) returns (EmbeddingResponse);

  // Indexing: text and/or binaries (URL), combinable. Stream of chunks.
  rpc EmbedContent(EmbedContentRequest) returns (stream EmbeddedChunk);

  // Query: text and/or inline image, combinable. A single vector.
  rpc EmbedQuery(EmbedQueryRequest) returns (EmbeddedVector);
}

enum ChunkType {
    CHUNK_TYPE_DEFAULT = 0;
    CHUNK_TYPE_TEXT_SPLITTER = 1;
    CHUNK_TYPE_TOKEN_TEXT_SPLITTER = 2;
    CHUNK_TYPE_CHARACTER_TEXT_SPLITTER = 3;
    CHUNK_TYPE_SEMANTIC_SPLITTER = 4;
    CHUNK_TYPE_SENTENCE_SPLITTER = 5;
    CHUNK_TYPE_RECURSIVE_SPLITTER = 6;
    CHUNK_TYPE_TABLE_CHUNKER = 7;
    CHUNK_TYPE_LATE_CHUNKER = 8;
    CHUNK_TYPE_NEURAL_CHUNKER = 9;
}

message RequestChunk {
  optional ChunkType type = 1;
  google.protobuf.Struct jsonConfig = 2;
}

message ProviderModel {
  string provider = 1;
  string model = 2;
}

message EmbeddingModel {
  optional string apiKey = 1;
  ProviderModel providerModel = 2;
  .google.protobuf.Struct jsonConfig = 3;
  optional string apiUrl = 4;
}

message ResponseChunk {
  int32 number = 1;
  int32 total = 2;
  string text = 3;
  repeated float vectors = 4;
}

message EmbeddingRequest {
  RequestChunk chunk = 1;
  EmbeddingModel embeddingModel = 2;
  string text = 3;
}

message EmbeddingResponse {repeated ResponseChunk chunks = 1;}

// Type of vector written to the index; the same value governs the
// quantization in the module (after L2-norm) and the knn_vector mapping (B2).
enum VectorDataType {
  VECTOR_DATA_TYPE_FLOAT32 = 0;
  VECTOR_DATA_TYPE_BYTE = 1;    // int8, fixed range [-1,1] after L2 (B1)
  VECTOR_DATA_TYPE_BINARY = 2;  // sign + packbits MSB-first (B1)
}

// Reference to a binary to index. Storage is out of the contract: the
// module does a GET on the URL and nothing more (no S3 credentials, no
// bucket/key conventions, which stay in the Core).
message MediaRef {
  // Short-lived pre-signed GET, generated by the datasource at call time
  // and regenerated on every retry.
  string url = 1;
  // Binary discriminator, copied onto every chunk derived from it.
  string fileId = 2;
  // From connector metadata; drives per-modality routing (C2).
  string contentType = 3;
}

// Small media sent inline, reserved for query-time (image as query):
// a search does not write to object storage.
message InlineMedia {
  bytes data = 1;
  string contentType = 2;
}

message FloatVector {
  repeated float values = 1;
}

message EmbedContentRequest {
  string tenantId = 1;
  RequestChunk chunk = 2;
  EmbeddingModel embeddingModel = 3;
  VectorDataType vectorDataType = 4;

  // Content to index. text and refs are COMBINABLE:
  //   text | refs | text + refs (at least one, else INVALID_ARGUMENT).
  optional string text = 5;
  repeated MediaRef refs = 6;
}

message EmbedQueryRequest {
  string tenantId = 1;
  EmbeddingModel embeddingModel = 2;
  VectorDataType vectorDataType = 3;

  // Query. text and inline are COMBINABLE:
  //   text | inline | text + inline (at least one).
  // No chunking at query-time (no RequestChunk).
  optional string text = 4;
  optional InlineMedia inline = 5;
}

message EmbeddedChunk {
  // Progressive 1..N over the whole stream. Emission order guaranteed:
  // text chunks first, then refs chunks in list order.
  int32 number = 1;
  // Informational: present only when the server knows it (for text-only
  // it always does: chunking happens before embedding).
  optional int32 total = 2;
  string text = 3;
  // Source binary; absent for text chunks. The Core derives the modality
  // (fileId -> contentType of the matching ref).
  optional string fileId = 4;
  VectorDataType vectorDataType = 5;
  int32 dimension = 6;
  oneof vector {
    FloatVector f32 = 7;
    bytes i8 = 8;    // one signed byte per component
    bytes bits = 9;  // packed bits, dimension/8 bytes, MSB first
  }
}

// Single vector returned by EmbedQuery, quantized with the same
// vectorDataType as the index, so it is KNN-comparable.
message EmbeddedVector {
  VectorDataType vectorDataType = 1;
  int32 dimension = 2;
  oneof vector {
    FloatVector f32 = 3;
    bytes i8 = 4;
    bytes bits = 5;
  }
}
