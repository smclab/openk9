quarkus.application.name=tenant-manager

quarkus.datasource.db-kind=postgresql
quarkus.datasource.reactive.cache-prepared-statements=true
%prod.quarkus.datasource.jdbc.url=jdbc:${quarkus.datasource.reactive.url}
quarkus.liquibase.change-log=db/tenant-manager/changelog.xml
quarkus.liquibase.migrate-at-start=true
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.hibernate-orm.packages=io.openk9.tenantmanager.model
quarkus.keycloak.admin-client.server-url=${keycloak.url}
quarkus.smallrye-graphql.ui.always-include=true

quarkus.tls.trust-all=true
%prod.quarkus.grpc.clients.appmanager.host=openk9-k8s-client
%prod.quarkus.grpc.clients.datasource.host=openk9-datasource

# openk9
openk9.datasource.url=${quarkus.datasource.reactive.url}
openk9.datasource.liquibase.change-log=/db/datasource/changelog.xml
openk9.datasource.liquibase.database-change-log-lock-table-name=databasechangeloglock
openk9.datasource.liquibase.database-change-log-table-name=databasechangelog
openk9.tenant-manager.create-tenant-timeout=45s

%prod-oracle.quarkus.datasource.db-kind=oracle
%prod-oracle.quarkus.hibernate-orm.quote-identifiers.strategy=only-keywords
quarkus.rabbitmq.devservices.image-name=rabbitmq:4-management

quarkus.rabbitmqclient.virtual-host=/
quarkus.rabbitmqclient.username=${rabbitmq-username}
quarkus.rabbitmqclient.password=${rabbitmq-password}
quarkus.rabbitmqclient.hostname=${rabbitmq-host}
quarkus.rabbitmqclient.port=${rabbitmq-port}

%dev.openk9.security.admin.password=admin
%dev.openk9.tenant-manager.keycloak-base-issuer-uri=http://localhost:9090/realms/

#
# Realm template hardening defaults (see RealmTemplateConfig)
# All values have secure defaults via @WithDefault
#
# Password policy
# io.openk9.tenantmanager.keycloak.realm.password-policy.length=8
# io.openk9.tenantmanager.keycloak.realm.password-policy.upper-case=1
# io.openk9.tenantmanager.keycloak.realm.password-policy.lower-case=1
# io.openk9.tenantmanager.keycloak.realm.password-policy.digits=1
# io.openk9.tenantmanager.keycloak.realm.password-policy.special-chars=1
# io.openk9.tenantmanager.keycloak.realm.password-policy.history=5
# io.openk9.tenantmanager.keycloak.realm.password-policy.expiration-days=90
#
# Brute force protection
# io.openk9.tenantmanager.keycloak.realm.brute-force.failure-factor=10
# io.openk9.tenantmanager.keycloak.realm.brute-force.permanent-lockout=true
# io.openk9.tenantmanager.keycloak.realm.brute-force.wait-increment-seconds=60
# io.openk9.tenantmanager.keycloak.realm.brute-force.max-failure-wait-seconds=900
# io.openk9.tenantmanager.keycloak.realm.brute-force.max-delta-time-seconds=43200
# io.openk9.tenantmanager.keycloak.realm.brute-force.minimum-quick-login-wait-seconds=60
# io.openk9.tenantmanager.keycloak.realm.brute-force.quick-login-check-milli-seconds=1000
# io.openk9.tenantmanager.keycloak.realm.brute-force.strategy=MULTIPLE
# io.openk9.tenantmanager.keycloak.realm.brute-force.max-temporary-lockouts=5
#
# Events / audit
# io.openk9.tenantmanager.keycloak.realm.events.enabled=true
# io.openk9.tenantmanager.keycloak.realm.events.expiration-seconds=2592000
# io.openk9.tenantmanager.keycloak.realm.events.listeners=jboss-logging
# io.openk9.tenantmanager.keycloak.realm.events.admin-enabled=true
# io.openk9.tenantmanager.keycloak.realm.events.admin-details-enabled=true
#
# Security: Basic Authentication (always on)
quarkus.http.auth.basic=true
quarkus.http.auth.policy.administrators.roles-allowed=k9-admin
quarkus.http.auth.permission.admin.paths=/api/*
quarkus.http.auth.permission.admin.policy=administrators
quarkus.http.auth.permission.public.paths=/q/*
quarkus.http.auth.permission.public.policy=permit
