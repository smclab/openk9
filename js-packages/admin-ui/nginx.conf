server {
    listen       8080;
    server_name  localhost;

    # HTTP security headers (issue #1906)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # frame-ancestors is enforced; the resource policy starts as
    # Report-Only and becomes blocking once tuned (see issue #1906)
    add_header Content-Security-Policy "frame-ancestors 'none'" always;
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'" always;

    root  /usr/share/nginx/html/admin/;
    index index.html;

    location /admin/static/ {
      root /usr/share/nginx/html/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
