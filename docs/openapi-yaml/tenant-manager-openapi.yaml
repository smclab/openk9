---
openapi: 3.1.0
components:
  schemas:
    CreateConnectorRequest:
      type: object
      required:
      - tenantName
      properties:
        tenantName:
          type: string
          minLength: 1
        preset:
          $ref: "#/components/schemas/Preset"
    CreateConnectorResponse:
      type: object
      properties:
        result:
          type: string
    CreateTablesResponse:
      type: object
      properties:
        message:
          type: string
    CreateTenantRequest:
      description: Request payload for creating a new tenant.
      type: object
      required:
      - virtualHost
      - securityConfiguration
      properties:
        virtualHost:
          type: string
          description: Hostname that identifies this tenant (e.g. demo.openk9.io).
            Used as Ingress host and Keycloak realm alias.
          examples:
          - demo.openk9.io
          minLength: 1
        securityConfiguration:
          description: "Gateway-level authorization model. Determines which routes\
            \ require OAuth2, API keys, or no auth."
          type: string
          $ref: "#/components/schemas/SecurityConfiguration"
        oAuth2Settings:
          description: "External identity provider credentials. When provided, Keycloak\
            \ realm provisioning is skipped and these values are stored directly.\
            \ Omit to auto-provision via Keycloak (if available)."
          type: object
          $ref: "#/components/schemas/OAuth2Settings"
        tenantName:
          type: string
          description: "Tenant identifier used as database schema name and Kubernetes\
            \ resource prefix. Must match [a-z][a-z0-9]{0,62}. Omit to auto-generate."
          examples:
          - demo
        ingressScopes:
          type: array
          items:
            $ref: "#/components/schemas/IngressScope"
          description: "Route groups to expose on the Kubernetes Ingress: SEARCH,\
            \ ADMINISTRATION, RAG, INGESTION. Omit for the default set (SEARCH, ADMINISTRATION,\
            \ RAG). An empty list skips ingress creation entirely."
    DeleteTenantRequest:
      type: object
      required:
      - virtualHost
      properties:
        virtualHost:
          type: string
          minLength: 1
    DeleteTenantResponse:
      type: object
      properties:
        message:
          type: string
    EffectiveDeleteTenantRequest:
      type: object
      required:
      - virtualHost
      - token
      properties:
        virtualHost:
          type: string
          minLength: 1
        token:
          type: string
          minLength: 1
    IngressScope:
      type: string
      enum:
      - SEARCH
      - ADMINISTRATION
      - RAG
      - INGESTION
      - UNRECOGNIZED
    InitTenantRequest:
      type: object
      required:
      - tenantName
      properties:
        tenantName:
          type: string
          minLength: 1
    InitTenantResponse:
      type: object
      properties:
        bucketId:
          type: integer
          format: int64
    OAuth2Settings:
      type: object
      description: "External OAuth2 identity provider credentials. When provided,\
        \ Keycloak realm auto-provisioning is skipped."
      required:
      - issuerUri
      - clientId
      properties:
        issuerUri:
          type: string
          description: OpenID Connect issuer URI.
          examples:
          - https://idp.example.com/realms/myrealm
        clientId:
          type: string
          description: OAuth2 client identifier.
        clientSecret:
          type: string
          description: OAuth2 client secret. Omit for public clients.
    Preset:
      type: string
      enum:
      - YOUTUBE
      - CRAWLER
      - EMAIL
      - GITLAB
      - SITEMAP
      - DATABASE
      - MINIO
      - UNRECOGNIZED
    SecurityConfiguration:
      type: string
      enum:
      - OAUTH2_ADMIN_ONLY
      - OAUTH2_SEARCH
      - OAUTH2_SEARCH_WITH_API_KEY
      - OAUTH2_ADMIN_WITH_API_KEY
      - NO_GATEWAY_AUTH
    TenantResponseDTO:
      type: object
      properties:
        id:
          type: string
        tenantName:
          type: string
        virtualHost:
          type: string
        clientId:
          type: string
        clientSecret:
          type: string
        issuerUri:
          type: string
        securityConfiguration:
          $ref: "#/components/schemas/SecurityConfiguration"
        realmProvisioned:
          type: boolean
info:
  contact:
    email: dev@openk9.io
    name: OpenK9 Support
  description: Create and manage the tenants within this OpenK9 installation
  license:
    name: GNU Affero General Public License v3.0
    url: https://github.com/smclab/openk9/blob/main/LICENSE
  title: Tenant Manager Service
  version: 2026.1.0-SNAPSHOT
tags:
- name: Tenant Provisioning
  description: "Endpoints that create new tenants, request deletion, and bootstrap\
    \ their default content."
- name: Tenant Management
  description: Maintenance endpoints on existing tenants.
security:
- SecurityScheme: []
paths:
  /provisioning/connector:
    post:
      summary: Create a preset connector plugin driver for a tenant
      description: "Deploys the Helm chart of the selected preset connector for the\
        \ target tenant and registers the corresponding plugin driver. The preset\
        \ is selected from the supported values (YOUTUBE, CRAWLER, EMAIL, GITLAB,\
        \ SITEMAP, DATABASE, MINIO). The saga runs asynchronously and the response's\
        \ `result` field carries the saga outcome (SUCCESS, ERROR, COMPENSATION or\
        \ COMPENSATION_ERROR)."
      operationId: createConnector
      tags:
      - Tenant Provisioning
      requestBody:
        content:
          application/json:
            examples:
              create connector:
                value:
                  tenantName: demo
                  preset: CRAWLER
            schema:
              $ref: "#/components/schemas/CreateConnectorRequest"
        required: true
      responses:
        "200":
          description: Connector creation saga completed
          content:
            application/json:
              example:
                result: demo-CRAWLER-2026_1_0-SNAPSHOT
              schema:
                $ref: "#/components/schemas/CreateConnectorResponse"
        "500":
          description: "Saga orchestrator failure (e.g. ask timeout, actor system\
            \ error)"
  /provisioning/initTenant:
    post:
      summary: Initialize the default bucket for an existing tenant
      description: Triggers the post-provisioning step that creates the default datasource
        bucket for an existing tenant schema. Returns the identifier of the bucket
        created in the datasource service.
      operationId: initTenant
      tags:
      - Tenant Provisioning
      requestBody:
        content:
          application/json:
            examples:
              init tenant:
                value:
                  tenantName: demo
            schema:
              $ref: "#/components/schemas/InitTenantRequest"
        required: true
      responses:
        "200":
          description: Tenant initialization successful
          content:
            application/json:
              example:
                bucketId: 42
              schema:
                $ref: "#/components/schemas/InitTenantResponse"
  /tenant-manager/tenant:
    post:
      summary: Create and provision a new tenant
      description: "Provisions a new tenant: assigns a virtual host, creates the database\
        \ schema, configures the security model, optionally bootstraps a Keycloak\
        \ realm, and exposes the configured ingress routes. Returns the descriptor\
        \ of the created tenant."
      operationId: createTenant
      tags:
      - Tenant Provisioning
      requestBody:
        content:
          application/json:
            examples:
              minimal:
                summary: Minimal tenant with Keycloak auto-provisioning
                description: "Only the required fields. OpenK9 provisions a Keycloak\
                  \ realm and exposes the default ingress (SEARCH, ADMINISTRATION,\
                  \ RAG). The tenant name is auto-generated."
                value:
                  virtualHost: demo.openk9.io
                  securityConfiguration: OAUTH2_ADMIN_ONLY
              external-idp:
                summary: Tenant authenticated by an external OAuth2 identity provider
                description: Provide oAuth2Settings to skip Keycloak provisioning
                  and reuse an existing IdP. The clientId/clientSecret pair authenticates
                  against the issuer.
                value:
                  virtualHost: demo.openk9.io
                  securityConfiguration: OAUTH2_ADMIN_ONLY
                  tenantName: demo
                  oAuth2Settings:
                    issuerUri: https://idp.example.com/realms/demo
                    clientId: openk9-admin
                    clientSecret: s3cr3t
              search-only-public:
                summary: Anonymous public search-only deployment
                description: "**WARNING — development-only configuration.** Use only\
                  \ in local development environments, or in deployments shipped via\
                  \ Docker Compose for evaluation / PoC. Do not enable in production.\
                  \ No gateway authentication: only the SEARCH ingress is exposed\
                  \ and search is reachable anonymously. Administration, RAG and ingestion\
                  \ routes are not configured."
                value:
                  virtualHost: search.example.io
                  securityConfiguration: NO_GATEWAY_AUTH
                  ingressScopes:
                  - SEARCH
              api-key-ingestion:
                summary: "OAuth2 admin/search, API key on data and ingestion paths"
                description: "Admin and search routes use OAuth2; data and ingestion\
                  \ routes are protected by API keys. Full ingress (SEARCH, ADMINISTRATION,\
                  \ RAG, INGESTION) exposed."
                value:
                  virtualHost: demo.openk9.io
                  securityConfiguration: OAUTH2_SEARCH_WITH_API_KEY
                  tenantName: demo
                  ingressScopes:
                  - SEARCH
                  - ADMINISTRATION
                  - RAG
                  - INGESTION
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
        required: true
      responses:
        "200":
          description: Tenant created
          content:
            application/json:
              example:
                id: "42"
                tenantName: demo
                virtualHost: demo.openk9.io
                clientId: demo-client
                clientSecret: s3cr3t
                issuerUri: https://keycloak.openk9.io/realms/demo
                securityConfiguration: OAUTH2_ADMIN_ONLY
                realmProvisioned: true
              schema:
                $ref: "#/components/schemas/TenantResponseDTO"
  /tenant-manager/tenant/delete:
    post:
      summary: Request the deletion of a tenant
      description: Issues a deletion request for the tenant identified by virtual
        host. Returns a confirmation token that must be supplied to the DELETE endpoint
        to actually remove the tenant.
      operationId: requestDeleteTenant
      tags:
      - Tenant Provisioning
      requestBody:
        content:
          application/json:
            examples:
              request delete tenant:
                value:
                  virtualHost: demo.openk9.io
            schema:
              $ref: "#/components/schemas/DeleteTenantRequest"
        required: true
      responses:
        "200":
          description: Deletion token issued
          content:
            application/json:
              example:
                message: "Deletion token: 9f1e0b8c-4f2a-4f7d-9e5f-3c2a1b0d4e6a"
              schema:
                $ref: "#/components/schemas/DeleteTenantResponse"
    delete:
      summary: Confirm and execute a tenant deletion
      description: "Permanently removes the tenant identified by virtual host, using\
        \ the confirmation token previously issued by the POST /delete endpoint."
      operationId: deleteTenant
      tags:
      - Tenant Provisioning
      requestBody:
        content:
          application/json:
            examples:
              delete tenant:
                value:
                  virtualHost: demo.openk9.io
                  token: 9f1e0b8c-4f2a-4f7d-9e5f-3c2a1b0d4e6a
            schema:
              $ref: "#/components/schemas/EffectiveDeleteTenantRequest"
        required: true
      responses:
        "200":
          description: Tenant deleted
          content:
            application/json:
              example:
                message: Tenant deletion started.
              schema:
                $ref: "#/components/schemas/DeleteTenantResponse"
  /tenant-manager/tenant/{id}/tables:
    post:
      summary: Populate the database schema of an existing tenant
      description: Creates the application tables for the tenant identified by the
        path parameter. The tenant's database schema must already exist.
      operationId: createTables
      tags:
      - Tenant Management
      parameters:
      - description: Identifier of the tenant whose tables must be created.
        in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Tables created
          content:
            application/json:
              example:
                message: Tables created for tenant 42
              schema:
                $ref: "#/components/schemas/CreateTablesResponse"
