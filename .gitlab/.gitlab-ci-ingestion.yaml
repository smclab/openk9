###################### INGESTION CHILD PIPELINE ######################
include:
  - local: '/.gitlab/.gitlab-templates.yaml'
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- build
- build-verifier
- container-scanning
- restart

Build Ingestion image:
  extends: .build_template
  variables:
    COMPONENT: "ingestion"
  stage: build
  script:
  - cd core
  - !reference [.maven-build-logic, script]
  artifacts:
    paths:
    - .version
    expire_in: 24 hours
  rules:
    # Push image only on main/tag/feature branch - NOT on MR
    - !reference [.rules:child-deploy-main-tag, rules]
    - !reference [.rules:child-restart-feature, rules]

######################## BUILD VERIFIER ########################
Build Verifier Ingestion:
  extends: .maven-verifier-template
  stage: build-verifier
  variables:
    COMPONENT: "ingestion"
  rules:
    # Run only on MR - lightweight compile check, no push
    - !reference [.rules:child-verify-mr, rules]

# SCANNING JOB
Container Scanning Ingestion:
  dependencies: [ Build Ingestion image ]
  extends: .container-scanning-template
  variables:
    REGISTRY_COMPONENT_NAME: "openk9-ingestion"
  rules:
    - !reference [.rules:child-deploy-main-tag, rules]

# RESTART JOB
Trigger Restart Ingestion:
  extends: .restart_job_template
  dependencies:
  - Build Ingestion image
  variables:
    COMPONENT_NAME: "ingestion"
    COMPONENT_TYPE: "backend"
  rules:
    - !reference [.rules:child-deploy-main-tag, rules]
    - !reference [.rules:child-restart-feature, rules]
