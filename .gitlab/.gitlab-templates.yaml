# =================================================================================
# Templates for the RELEASE BRANCH (3.0.x) pipeline.
# Only release-flavoured templates live here; legacy main/feature/MR templates are
# on the `main` branch.
# =================================================================================

# Image used by the AI Container Scanning template — kept here for completeness even
# if container-scanning is currently disabled on this branch.
variables:
  CS_ANALYZER_IMAGE: "registry.gitlab.com/security-products/container-scanning:8"

# ========================================
# TEMPLATE: .build_template
# ========================================
# Base image + Maven cache + artifacts shared by every backend Maven build.
.build_template:
  image: maven:3.9.6-eclipse-temurin-21
  variables:
    MAVEN_CLI_OPTS: "--batch-mode --no-transfer-progress -DskipTests -Dquarkus.devservices.enabled=false"
    MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  cache:
    # Shared Maven cache across all backend components; pull-push so that
    # release-branch builds populate it for every job in the same pipeline.
    key: "shared-mvn"
    paths:
    - $CI_PROJECT_DIR/.m2/repository
    policy: pull-push
  artifacts:
    paths:
    - "$CI_PROJECT_DIR/core/app/$COMPONENT/target/"
    expire_in: 2 days

# ========================================
# TEMPLATE: .maven-build-logic-release
# ========================================
# Maven build for release branch (3.0.x) and release tags (3.0.N).
#
#   push 3.0.x  → tag image with VERSION read from pom (e.g. 3.0.3-SNAPSHOT)
#   tag 3.0.N   → tag image with $CI_COMMIT_TAG          (e.g. 3.0.1)
#
# .version artifact mirrors the pushed tag so downstream jobs (Restart, Skopeo)
# can resolve it without re-checking branch/tag context.
.maven-build-logic-release:
  script:
  - |
    echo "Release build for: $COMPONENT"

    POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
    if [[ -n "$CI_COMMIT_TAG" ]]; then
      IMAGE_TAG="$CI_COMMIT_TAG"
      echo "Tag release: push $IMAGE_TAG"
    else
      IMAGE_TAG="$POM_VERSION"
      echo "Release branch: push $IMAGE_TAG"
    fi

    echo "$IMAGE_TAG" > $CI_PROJECT_DIR/.version

    eval "mvn $MAVEN_CLI_OPTS package \
      -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository \
      -pl ../vendor/hibernate-rx-multitenancy/deployment,app/$COMPONENT -am \
      -Dquarkus.container-image.build=true \
      -Dquarkus.container-image.push=true \
      -Dquarkus.container-image.tag=$IMAGE_TAG"

# ========================================
# TEMPLATE: .maven-build-verifier-logic
# ========================================
# Lightweight Maven build for compile-only verification (release MR / porting push).
# Does NOT push to registry. Used by Build Verifier <X> Release MR / Porting Push jobs.
.maven-build-verifier-logic:
  script:
  - |
    echo "Build Verifier (compile only) for: $COMPONENT"
    cd core
    mvn $MAVEN_CLI_OPTS package \
      -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository \
      -pl ../vendor/hibernate-rx-multitenancy/deployment,app/$COMPONENT -am \
      -Dquarkus.container-image.build=false \
      -Dquarkus.container-image.push=false
    echo "Build Verifier completed for $COMPONENT"

# ========================================
# TEMPLATE: .maven-verifier-template
# ========================================
# Verifier job for release MR + porting push. Pull-only cache: must NOT
# overwrite the shared Maven cache with unreviewed code.
.maven-verifier-template:
  extends: .build_template
  cache:
    key: "shared-mvn"
    paths:
    - $CI_PROJECT_DIR/.m2/repository
    policy: pull
  script:
  - !reference [.maven-build-verifier-logic, script]

# ========================================
# TEMPLATE: .restart_job_template
# ========================================
# Triggers the external restart pipeline. The release branch only restarts the
# TARGET_ENV (k9-stable-2) — tags do NOT auto-restart (production deploy is
# handled manually by ops/ArgoCD).
#
# IMAGE_TAG is read from .version (backend), config.env (AI) or version.env (frontend).
# Required variables in each calling job:
#   COMPONENT_NAME — short name (e.g. "datasource")
#   COMPONENT_TYPE — "backend", "ai", "frontend"
#   TARGET_ENV     — release namespace (e.g. "k9-stable-2")
.restart_job_template:
  stage: restart
  image: alpine:3.16
  script:
  - apk add --no-cache bash curl
  - echo "CI_COMMIT_BRANCH=$CI_COMMIT_BRANCH"
  - echo "COMPONENT_NAME=$COMPONENT_NAME"
  - echo "COMPONENT_TYPE=$COMPONENT_TYPE"
  - echo "TARGET_ENV=$TARGET_ENV"
  - |
    bash -c '
    if [ "$COMPONENT_TYPE" = "frontend" ] && [ -f "$CI_PROJECT_DIR/version.env" ]; then
      source "$CI_PROJECT_DIR/version.env"
      export IMAGE_TAG="$VERSION"
    elif [ "$COMPONENT_TYPE" = "backend" ] && [ -f "$CI_PROJECT_DIR/.version" ]; then
      IMAGE_TAG=$(cat "$CI_PROJECT_DIR/.version")
    elif [ "$COMPONENT_TYPE" = "ai" ] && [ -f "$CI_PROJECT_DIR/config.env" ]; then
      source "$CI_PROJECT_DIR/config.env"
      export IMAGE_TAG="$VERSION"
    else
      echo "ERROR: no version file found for COMPONENT_TYPE=$COMPONENT_TYPE"
      exit 1
    fi

    if [ -z "$TARGET_ENV" ]; then
      echo "ERROR: TARGET_ENV is not set"
      exit 1
    fi

    echo "Triggering restart: COMPONENT_NAME=$COMPONENT_NAME, IMAGE_TAG=$IMAGE_TAG, TARGET_ENV=$TARGET_ENV"

    curl -X POST \
      -F "token=${RESTART_TRIGGER_TOKEN}" \
      -F "variables[TRIGGER_JOB]=restart-${COMPONENT_NAME}" \
      -F "variables[IMAGE_TAG]=$IMAGE_TAG" \
      -F "variables[COMPONENT_TYPE]=$COMPONENT_TYPE" \
      -F "variables[CI_COMMIT_BRANCH]=$CI_COMMIT_BRANCH" \
      -F "variables[GITLAB_USER_LOGIN]=$GITLAB_USER_LOGIN" \
      -F "variables[TARGET_ENV]=$TARGET_ENV" \
      -F "ref=master" \
      "${RESTART_TRIGGER_URL}"
    '

# ========================================
# TEMPLATE: .skopeo-copy-to-dockerhub
# ========================================
# Copies the already-built image from the internal registry to Docker Hub.
# Runs on release tag only (push 3.0.x is not copied to Docker Hub).
#
# Source:      $CI_REGISTRY_NAME/openk9/$REGISTRY_COMPONENT_NAME:<version>
# Destination: docker.io/smclab/$REGISTRY_COMPONENT_NAME:<version>
#
# Version resolution (from build job artifacts):
#   - Backend modules:  .version    (written by .maven-build-logic-release)
#   - AI modules:       config.env  (written by Fetch config job — overridden by tag)
#   - Frontend modules: version.env (written by Fetch version job)
#
# On release tag the version on disk may be the branch SNAPSHOT, so we prefer
# $CI_COMMIT_TAG when present.
#
# Required variable in each calling job:
#   REGISTRY_COMPONENT_NAME — image name on the registry, e.g. "openk9-datasource"
#
# CI/CD variables (set in GitLab project settings, masked+protected):
#   DOCKER_HUB_USER     — Docker Hub username
#   DOCKER_HUB_PASSWORD — Docker Hub password or access token
.skopeo-copy-to-dockerhub:
  stage: push
  image:
    name: quay.io/skopeo/stable:v1.22.0
    entrypoint: [""]
  variables:
    GIT_STRATEGY: none
  script:
  - |
    if [ -n "$CI_COMMIT_TAG" ]; then
      VERSION="$CI_COMMIT_TAG"
    elif [ -f "$CI_PROJECT_DIR/.version" ]; then
      VERSION=$(cat "$CI_PROJECT_DIR/.version")
    elif [ -f "$CI_PROJECT_DIR/config.env" ]; then
      source "$CI_PROJECT_DIR/config.env"
    elif [ -f "$CI_PROJECT_DIR/version.env" ]; then
      source "$CI_PROJECT_DIR/version.env"
    else
      echo "ERROR: no version source found — cannot determine image version"
      exit 1
    fi
    echo "VERSION=$VERSION"
    SRC="docker://$CI_REGISTRY_NAME/openk9/$REGISTRY_COMPONENT_NAME:$VERSION"
    DST="docker://docker.io/smclab/$REGISTRY_COMPONENT_NAME:$VERSION"
    echo "Copying $SRC → $DST"
    skopeo copy \
      --src-creds "$CI_REGISTRY_USERNAME:$CI_REGISTRY_PASSWORD" \
      --dest-creds "$DOCKER_HUB_USER:$DOCKER_HUB_PASSWORD" \
      "$SRC" "$DST"
  rules:
  - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+/'
