###################### AGENTIC RAG MODULE CHILD PIPELINE ######################
include:
  - local: '/.gitlab/.gitlab-templates.yaml'
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- build
- build-verifier
- container-scanning
- restart
- push

variables:
  KANIKO_IMAGE: "gcr.io/kaniko-project/executor:v1.23.2-debug"

#################
# Fetch Config  #
#################
Fetch config:
  stage: build
  image: alpine:3.16
  script:
  - apk add --no-cache grep
  - VERSION=$(grep '^OPENK9_VERSION=' python_modules_config.txt | cut -d '=' -f2)
  - PYTHON_BASE_DOCKER_IMAGE=$(grep '^PYTHON_BASE_DOCKER_IMAGE=' python_modules_config.txt | cut -d '=' -f2)
  - echo "VERSION=$VERSION" > "$CI_PROJECT_DIR/config.env"
  - echo "PYTHON_BASE_DOCKER_IMAGE=$PYTHON_BASE_DOCKER_IMAGE" >> "$CI_PROJECT_DIR/config.env"
  artifacts:
    paths:
    - config.env
    expire_in: 1 day
  rules:
    - !reference [.rules:child-build-always, rules]

######################## BUILD AGENTIC RAG IMAGE (KANIKO) ########################
Build Agentic Rag Image:
  stage: build
  image:
    name: $KANIKO_IMAGE
    entrypoint: [""]
  needs:
  - job: Fetch config
    artifacts: true
  cache:
    # Shared pip cache across all AI modules (rag, agentic-rag, embedding).
    # These modules share many heavy dependencies (torch, transformers, etc.).
    # Removed 'when: always' to avoid writing a partial/corrupt cache on job failure.
    key: "shared-pip"
    paths:
    - .pip-cache/
    policy: pull-push
  before_script:
  - mkdir -p .pip-cache
  script:
  - source $CI_PROJECT_DIR/config.env
  - echo "=== Configuring Kaniko credentials ==="
  - mkdir -p /kaniko/.docker
  - |
    REGISTRY_AUTH=$(printf "%s:%s" "${CI_REGISTRY_USERNAME}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')
    DOCKERHUB_AUTH=$(printf "%s:%s" "${DOCKER_HUB_USER}" "${DOCKER_HUB_PASSWORD}" | base64 | tr -d '\n')
    printf '{"auths":{"registry.smc.it:49083":{"auth":"%s"},"https://index.docker.io/v1/":{"auth":"%s"}}}' \
      "${REGISTRY_AUTH}" "${DOCKERHUB_AUTH}" > /kaniko/.docker/config.json
  - |
    # ── Kaniko layer cache flags ──────────────────────────────────────────────────
    # --cache=true          enables Docker layer cache
    # --cache-repo          registry:2 on MinIO (bucket: kaniko-cache)
    # --cache-ttl=72h      layers older than 7 days are ignored
    # --snapshot-mode=redo  uses mtime instead of sha256 → avoids ~900s filesystem snapshots
    # --compressed-caching=false  prevents OOM (exit 137) on large layers (e.g. PyTorch)
    # ─────────────────────────────────────────────────────────────────────────────
    KANIKO_CACHE_FLAGS="--cache=true --cache-repo=kaniko-cache-registry.openk9.io/kaniko-cache --cache-ttl=72h --snapshot-mode=redo --compressed-caching=false"
    KANIKO_CONTEXT="--context ${CI_PROJECT_DIR}/ai-packages/agentic-rag-module --dockerfile ${CI_PROJECT_DIR}/ai-packages/agentic-rag-module/Dockerfile"

    if [ "$CI_COMMIT_BRANCH" = "main" ]; then
      echo "[AGENTIC-RAG] Build & push as :$VERSION"
      /kaniko/executor $KANIKO_CACHE_FLAGS $KANIKO_CONTEXT \
        --destination "${CI_REGISTRY_NAME}/openk9/openk9-agentic-rag-module:$VERSION"

    elif [ -n "$CI_MERGE_REQUEST_IID" ] || [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ] || \
         { [ "$CI_PIPELINE_SOURCE" = "parent_pipeline" ] && [ -z "$CI_COMMIT_BRANCH" ] && [ -z "$CI_COMMIT_TAG" ]; }; then
      echo "[AGENTIC-RAG] MR: build only, no push"
      /kaniko/executor $KANIKO_CACHE_FLAGS $KANIKO_CONTEXT --no-push

    elif echo "$CI_COMMIT_BRANCH" | grep -qE '^[0-9]+-.*$'; then
      if [ "$USER_TYPE" = "designated" ]; then
        echo "[AGENTIC-RAG] Feature (designated) => build & push :997-SNAPSHOT"
        /kaniko/executor $KANIKO_CACHE_FLAGS $KANIKO_CONTEXT \
          --destination "${CI_REGISTRY_NAME}/openk9/openk9-agentic-rag-module:997-SNAPSHOT"
      else
        echo "[AGENTIC-RAG] Feature (generic) => build only, no push"
        /kaniko/executor $KANIKO_CACHE_FLAGS $KANIKO_CONTEXT --no-push
      fi
    fi
  rules:
    # main: push versione; feature designated: push 997-SNAPSHOT; feature generic
    # e MR: build --no-push (per gli AI il docker build È la verifica MR, il
    # Build Verifier fa solo py_compile). Niente tag: su vN.N.N builda solo il
    # job Release — mutua esclusione main/release come backend/frontend (#2160).
    - !reference [.rules:child-deploy-main-tag, rules]
    - !reference [.rules:child-restart-feature, rules]
    - !reference [.rules:child-build-feature-generic, rules]
    - !reference [.rules:child-verify-mr, rules]

######################## BUILD VERIFIER AGENTIC RAG ########################
Build Verifier:
  stage: build-verifier
  image: python:3.12-slim
  script:
  - echo "=== Python syntax check for agentic-rag-module ==="
  - find ai-packages/agentic-rag-module -name "*.py" -not -path "*/__pycache__/*" | xargs python3 -m py_compile
  - echo "=== Syntax check passed ==="
  rules:
    - !reference [.rules:child-verify-mr, rules]

######################## CONTAINER SCANNING AGENTIC RAG #########################
Container Scanning Agentic Rag:
  stage: container-scanning
  image: $CS_ANALYZER_IMAGE
  needs:
  - job: Fetch config
    artifacts: true
  - job: Build Agentic Rag Image
    artifacts: false
  variables:
    CS_REGISTRY_USER: "$CI_REGISTRY_USERNAME"
    CS_REGISTRY_PASSWORD: "$CI_REGISTRY_PASSWORD"
    GIT_STRATEGY: fetch
    REGISTRY_COMPONENT_NAME: "openk9-agentic-rag-module"
  allow_failure: true
  artifacts:
    reports:
      container_scanning: gl-container-scanning-report.json
      cyclonedx: "**/gl-sbom-*.cdx.json"
    paths:
    - gl-container-scanning-report.json
    - gl-dependency-scanning-report.json
    - "**/gl-sbom-*.cdx.json"
  before_script:
  - source $CI_PROJECT_DIR/config.env
  - export CS_IMAGE="$CI_REGISTRY_NAME/openk9/$REGISTRY_COMPONENT_NAME:$VERSION"
  - echo "Using version $VERSION"
  script:
  - gtcs scan
  rules:
    # Container scanning only on main/tag (not on feature branches)
    - !reference [.rules:child-deploy-main-tag, rules]

######################## TRIGGER RESTART AGENTIC RAG #########################
Trigger Restart:
  extends: .restart_job_template
  variables:
    COMPONENT_NAME: "agentic-rag-module"
    COMPONENT_TYPE: "ai"
  needs:
  - job: Fetch config
    artifacts: true
  - job: Build Agentic Rag Image
    artifacts: false
  rules:
    # Run on main or designated feature branch — NOT on tags (no auto-restart)
    - !reference [.rules:child-restart-main, rules]
    - !reference [.rules:child-restart-feature, rules]

# --- RELEASE BRANCH JOBS ---

Build Agentic Rag Release:
  stage: build
  image:
    name: $KANIKO_IMAGE
    entrypoint: [""]
  needs:
  - job: Fetch config
    artifacts: true
  cache:
    key: "shared-pip"
    paths:
    - .pip-cache/
    policy: pull-push
  before_script:
  - mkdir -p .pip-cache
  script:
  - source $CI_PROJECT_DIR/config.env
  - mkdir -p /kaniko/.docker
  - |
    REGISTRY_AUTH=$(printf "%s:%s" "${CI_REGISTRY_USERNAME}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')
    DOCKERHUB_AUTH=$(printf "%s:%s" "${DOCKER_HUB_USER}" "${DOCKER_HUB_PASSWORD}" | base64 | tr -d '\n')
    printf '{"auths":{"registry.smc.it:49083":{"auth":"%s"},"https://index.docker.io/v1/":{"auth":"%s"}}}' \
      "${REGISTRY_AUTH}" "${DOCKERHUB_AUTH}" > /kaniko/.docker/config.json
  - |
    KANIKO_CACHE_FLAGS="--cache=true --cache-repo=kaniko-cache-registry.openk9.io/kaniko-cache --cache-ttl=72h --snapshot-mode=redo --compressed-caching=false"
    KANIKO_CONTEXT="--context ${CI_PROJECT_DIR}/ai-packages/agentic-rag-module --dockerfile ${CI_PROJECT_DIR}/ai-packages/agentic-rag-module/Dockerfile"

    if [ -n "$CI_COMMIT_TAG" ]; then
      echo "[AGENTIC-RAG Release] Tag: push $VERSION"
      /kaniko/executor $KANIKO_CACHE_FLAGS $KANIKO_CONTEXT \
        --destination "${CI_REGISTRY_NAME}/openk9/openk9-agentic-rag-module:$VERSION"
    else
      # The version comes from python_modules_config.txt, which already carries
      # -SNAPSHOT on a release branch. Push it as-is — appending would double it.
      echo "[AGENTIC-RAG Release] Branch: push $VERSION"
      /kaniko/executor $KANIKO_CACHE_FLAGS $KANIKO_CONTEXT \
        --destination "${CI_REGISTRY_NAME}/openk9/openk9-agentic-rag-module:$VERSION"
    fi
  rules:
    - !reference [.rules:child-deploy-release, rules]

Build Verifier Agentic Rag Release MR:
  stage: build-verifier
  image: python:3.12-slim
  script:
  - echo "=== Python syntax check for agentic-rag-module (release MR) ==="
  - find ai-packages/agentic-rag-module -name "*.py" -not -path "*/__pycache__/*" | xargs python3 -m py_compile
  - echo "=== Syntax check passed ==="
  rules:
    - !reference [.rules:child-verify-release-mr, rules]

Trigger Restart Agentic Rag Release:
  extends: .restart_job_template
  variables:
    COMPONENT_NAME: "agentic-rag-module"
    COMPONENT_TYPE: "ai"
    TARGET_ENV: "$RELEASE_TARGET_ENV"
  needs:
  - job: Fetch config
    artifacts: true
  - job: Build Agentic Rag Release
    artifacts: false
  rules:
    - !reference [.rules:child-restart-release, rules]

######################## COPY TO DOCKER HUB ########################
# Runs on main, release branch (N.N.x) and tag. Copies the already-built image to Docker Hub without rebuilding.
# See .skopeo-copy-to-dockerhub in .gitlab-templates.yaml for full details.
Copy Agentic Rag to DockerHub:
  extends: .skopeo-copy-to-dockerhub
  variables:
    REGISTRY_COMPONENT_NAME: "openk9-agentic-rag-module"
  needs:
    # Fetch config runs in every context and carries config.env (the image version).
    - job: Fetch config
      artifacts: true  # downloads config.env — needed to resolve the image version
    # Order gate only (image already on the registry): wait for whichever build ran.
    #   main / branch N.N.x → Build Agentic Rag Image; tag vN.N.N → Build Agentic Rag Release.
    - job: Build Agentic Rag Image
      artifacts: false
      optional: true
    - job: Build Agentic Rag Release
      artifacts: false
      optional: true
