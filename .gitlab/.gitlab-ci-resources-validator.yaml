###################### RESOURCES-VALIDATOR CHILD PIPELINE ######################
include:
  - local: '/.gitlab/.gitlab-templates.yaml'
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- build
- build-verifier
- container-scanning
- restart

Build Resources-Validator Image:
  extends: .build_template
  variables:
    COMPONENT: "resources-validator"
  stage: build
  script:
  - cd core
  - !reference [.maven-build-logic, script]
  artifacts:
    paths:
    - .version
    expire_in: 24 hours
  rules:
    # Push image only on main/tag/feature branch - NOT on MR
    - !reference [.rules:child-deploy-main-tag, rules]
    - !reference [.rules:child-restart-feature, rules]

######################## BUILD VERIFIER ########################
Build Verifier Resources-Validator:
  extends: .maven-verifier-template
  stage: build-verifier
  variables:
    COMPONENT: "resources-validator"
  rules:
    - !reference [.rules:child-verify-mr, rules]

# SCANNING JOB
Container Scanning Resources-Validator:
  dependencies: [ Build Resources-Validator Image ]
  extends: .container-scanning-template
  variables:
    REGISTRY_COMPONENT_NAME: "openk9-resources-validator"
  rules:
    - !reference [.rules:child-deploy-main-tag, rules]

# RESTART JOB
Trigger Restart Resources-Validator:
  extends: .restart_job_template
  dependencies:
  - Build Resources-Validator Image
  variables:
    COMPONENT_NAME: "resources-validator"
    COMPONENT_TYPE: "backend"
  rules:
    - !reference [.rules:child-deploy-main-tag, rules]
    - !reference [.rules:child-restart-feature, rules]
