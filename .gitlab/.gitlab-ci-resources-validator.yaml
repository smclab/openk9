###################### RESOURCES-VALIDATOR CHILD PIPELINE ######################
include:
  - local: '/.gitlab/.gitlab-templates.yaml'
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- build
- build-verifier
- container-scanning
- restart
- push

Build Resources-Validator Image:
  extends: .build_template
  variables:
    COMPONENT: "resources-validator"
  stage: build
  script:
  - cd core
  - !reference [.maven-build-logic, script]
  artifacts:
    paths:
    - .version
    expire_in: 24 hours
  rules:
    # main/tag: push versione; designated feature: push snapshot; generic feature: build no push
    - !reference [.rules:child-deploy-main-tag, rules]
    - !reference [.rules:child-restart-feature, rules]
    - !reference [.rules:child-build-feature-generic, rules]

######################## BUILD VERIFIER ########################
Build Verifier Resources-Validator:
  extends: .maven-verifier-template
  stage: build-verifier
  variables:
    COMPONENT: "resources-validator"
  rules:
    - !reference [.rules:child-verify-mr, rules]

# SCANNING JOB
Container Scanning Resources-Validator:
  dependencies: [ Build Resources-Validator Image ]
  extends: .container-scanning-template
  variables:
    REGISTRY_COMPONENT_NAME: "openk9-resources-validator"
  rules:
    - !reference [.rules:child-deploy-main-tag, rules]

# RESTART JOB
Trigger Restart Resources-Validator:
  extends: .restart_job_template
  dependencies:
  - Build Resources-Validator Image
  variables:
    COMPONENT_NAME: "resources-validator"
    COMPONENT_TYPE: "backend"
  rules:
    - !reference [.rules:child-restart-main, rules]
    - !reference [.rules:child-restart-feature, rules]

# --- RELEASE BRANCH JOBS ---

Build Resources-Validator Release:
  extends: .build_template
  variables:
    COMPONENT: "resources-validator"
  stage: build
  script:
  - cd core
  - !reference [.maven-build-logic-release, script]
  artifacts:
    paths:
    - .version
    expire_in: 24 hours
  rules:
    - !reference [.rules:child-deploy-release, rules]

Build Verifier Resources-Validator Release MR:
  extends: .maven-verifier-template
  stage: build-verifier
  variables:
    COMPONENT: "resources-validator"
  script:
  - !reference [.maven-build-verifier-logic, script]
  rules:
    - !reference [.rules:child-verify-release-mr, rules]

Trigger Restart Resources-Validator Release:
  extends: .restart_job_template
  dependencies:
  - Build Resources-Validator Release
  variables:
    COMPONENT_NAME: "resources-validator"
    COMPONENT_TYPE: "backend"
    TARGET_ENV: "$RELEASE_TARGET_ENV"
  rules:
    - !reference [.rules:child-deploy-release, rules]

######################## COPY TO DOCKER HUB ########################
# Runs only on Git tag. Copies the already-built image to Docker Hub without rebuilding.
# See .skopeo-copy-to-dockerhub in .gitlab-templates.yaml for full details.
Copy Resources Validator to DockerHub:
  extends: .skopeo-copy-to-dockerhub
  variables:
    REGISTRY_COMPONENT_NAME: "openk9-resources-validator"
  needs:
    - job: Build Resources-Validator Image
      artifacts: true  # downloads .version file — needed to resolve the image tag
