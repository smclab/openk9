###################### RAG MODULE CHILD PIPELINE ######################
include:
  - local: '/.gitlab/.gitlab-templates.yaml'
  # NEW: Include standardized child rules
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- build
- container-scanning
- restart
variables:
  KANIKO_IMAGE: "gcr.io/kaniko-project/executor:v1.23.2-debug"
# Fetch Config  #
#################
Fetch config:
  stage: build
  image: alpine:3.16
  script:
  - apk add --no-cache grep
  - VERSION=$(grep '^OPENK9_VERSION=' python_modules_config.txt | cut -d '=' -f2)
  # Extract PYTHON_BASE_DOCKER_IMAGE value from config file
  - PYTHON_BASE_DOCKER_IMAGE=$(grep '^PYTHON_BASE_DOCKER_IMAGE=' python_modules_config.txt | cut -d '=' -f2)
  # Write results to .env file
  - echo "VERSION=$VERSION" > "$CI_PROJECT_DIR/config.env"
  - echo "PYTHON_BASE_DOCKER_IMAGE=$PYTHON_BASE_DOCKER_IMAGE" >> "$CI_PROJECT_DIR/config.env"
  artifacts:
    paths:
    - config.env
    expire_in: 1 day
  rules:
    # Always run if triggered
    - !reference [.rules:child-build-always, rules]

######################## BUILD RAG IMAGE (KANIKO) ########################
Build Rag Image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [ "" ]
  needs:
  - job: Fetch config
    artifacts: true
  cache:
    key: "rag-module-${CI_COMMIT_REF_SLUG}"
    paths:
    - .pip-cache/
    policy: pull-push
    when: always
  before_script:
  - mkdir -p .pip-cache
  script:
  - source $CI_PROJECT_DIR/config.env
  - echo "=== Configuring Kaniko credentials ==="
  - mkdir -p /kaniko/.docker
  - |
    echo "{\"auths\":{\"registry.smc.it:49083\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USERNAME}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"},\"https://index.docker.io/v1/\":{\"auth\":\"$(printf "%s:%s" "${DOCKER_HUB_USER}" "${DOCKER_HUB_PASSWORD}" | base64 | tr -d '\n')\"}}}" \
    > /kaniko/.docker/config.json
  - |
    if [ "$CI_COMMIT_BRANCH" = "main" ] || [ -n "$CI_COMMIT_TAG" ]; then
      echo "[RAG] Build & push as :$VERSION"
      # ── Kaniko layer cache (added 2026-02) ────────────────────────────────────────
      # --cache=true         abilita il Docker layer cache
      # --cache-repo         registry:2 su MinIO (k9-requirements, bucket: kaniko-cache)
      #                      evita di riempire il registry SMC con layer temporanei
      # --cache-ttl=168h     layer più vecchi di 7 giorni vengono ignorati
      #                      coerente con il MinIO lifecycle TTL sul bucket
      # --snapshot-mode=redo usa mtime invece di sha256 per rilevare cambiamenti
      #                      riduce "Taking snapshot of full filesystem" da ~900s a ~5s
      # ──────────────────────────────────────────────────────────────────────────────
      /kaniko/executor \
        --cache=true \
        --cache-repo=kaniko-cache-registry.openk9.io/kaniko-cache \
        --cache-ttl=168h \
        --snapshot-mode=redo \
        --context "${CI_PROJECT_DIR}/ai-packages/rag-module" \
        --dockerfile "${CI_PROJECT_DIR}/ai-packages/rag-module/Dockerfile" \
        --destination "${CI_REGISTRY_NAME}/openk9/rag-module:$VERSION"
    elif [ -n "$CI_MERGE_REQUEST_IID" ] || [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then
      echo "[RAG] Build & push as :merge-request"
      # ── Kaniko layer cache (added 2026-02) ────────────────────────────────────────
      # --cache=true         abilita il Docker layer cache
      # --cache-repo         registry:2 su MinIO (k9-requirements, bucket: kaniko-cache)
      #                      evita di riempire il registry SMC con layer temporanei
      # --cache-ttl=168h     layer più vecchi di 7 giorni vengono ignorati
      #                      coerente con il MinIO lifecycle TTL sul bucket
      # --snapshot-mode=redo usa mtime invece di sha256 per rilevare cambiamenti
      #                      riduce "Taking snapshot of full filesystem" da ~900s a ~5s
      # ──────────────────────────────────────────────────────────────────────────────
      /kaniko/executor \
        --cache=true \
        --cache-repo=kaniko-cache-registry.openk9.io/kaniko-cache \
        --cache-ttl=168h \
        --snapshot-mode=redo \
        --context "${CI_PROJECT_DIR}/ai-packages/rag-module" \
        --dockerfile "${CI_PROJECT_DIR}/ai-packages/rag-module/Dockerfile" \
        --destination "${CI_REGISTRY_NAME}/openk9/rag-module:$VERSION"
    elif echo "$CI_COMMIT_BRANCH" | grep -qE '^[0-9]+-.*$'; then
      # Feature branch - check user
      if [ "$GITLAB_USER_LOGIN" = "luca.callocchia" ]; then
        echo "[RAG] Feature branch (Luca) => build & push :997-SNAPSHOT"
      else
        echo "[RAG] Feature branch => build & push :997-SNAPSHOT"
      fi
      # ── Kaniko layer cache (added 2026-02) ────────────────────────────────────────
      # --cache=true         abilita il Docker layer cache
      # --cache-repo         registry:2 su MinIO (k9-requirements, bucket: kaniko-cache)
      #                      evita di riempire il registry SMC con layer temporanei
      # --cache-ttl=168h     layer più vecchi di 7 giorni vengono ignorati
      #                      coerente con il MinIO lifecycle TTL sul bucket
      # --snapshot-mode=redo usa mtime invece di sha256 per rilevare cambiamenti
      #                      riduce "Taking snapshot of full filesystem" da ~900s a ~5s
      # ──────────────────────────────────────────────────────────────────────────────
      /kaniko/executor \
        --cache=true \
        --cache-repo=kaniko-cache-registry.openk9.io/kaniko-cache \
        --cache-ttl=168h \
        --snapshot-mode=redo \
        --context "${CI_PROJECT_DIR}/ai-packages/rag-module" \
        --dockerfile "${CI_PROJECT_DIR}/ai-packages/rag-module/Dockerfile" \
        --destination "${CI_REGISTRY_NAME}/openk9/rag-module:997-SNAPSHOT"
    fi
  rules:
    # Always run build if parent triggered us
    - !reference [.rules:child-build-always, rules]

######################## CONTAINER SCANNING RAG #########################
Container Scanning Rag:
  stage: container-scanning
  image: $CS_ANALYZER_IMAGE
  needs:
  - job: Fetch config
    artifacts: true
  - job: Build Rag Image
    artifacts: false
  variables:
    CS_REGISTRY_USER: "$CI_REGISTRY_USERNAME"
    CS_REGISTRY_PASSWORD: "$CI_REGISTRY_PASSWORD"
    GIT_STRATEGY: fetch
    REGISTRY_COMPONENT_NAME: "rag-module"
  allow_failure: true
  artifacts:
    reports:
      container_scanning: gl-container-scanning-report.json
      cyclonedx: "**/gl-sbom-*.cdx.json"
    paths:
    - gl-container-scanning-report.json
    - gl-dependency-scanning-report.json
    - "**/gl-sbom-*.cdx.json"
  before_script:
  - source $CI_PROJECT_DIR/config.env
  - export CS_IMAGE="$CI_REGISTRY_NAME/openk9/$REGISTRY_COMPONENT_NAME:$VERSION"
  - echo "Using version $VERSION"
  script:
  - gtcs scan
  rules:
    # Run only on Main and Feature Branches (as per original logic, seemingly scanning feature too?)
    # Original rule was: - if: '$CI_COMMIT_BRANCH == "main"' OR feature regex.
    # So yes, scan on feature branch too.
    - !reference [.rules:child-deploy-main-tag, rules]
    - !reference [.rules:child-restart-feature, rules]

######################## TRIGGER RESTART RAG #########################
Trigger Restart:
  extends: .restart_job_template
  variables:
    COMPONENT_NAME: "rag-module"
    COMPONENT_TYPE: "ai"
  needs:
  - job: Fetch config
    artifacts: true
  - job: Build Rag Image
    artifacts: false
  rules:
    # Run on Main and Feature Branches
    - !reference [.rules:child-deploy-main-tag, rules]
    - !reference [.rules:child-restart-feature, rules]
