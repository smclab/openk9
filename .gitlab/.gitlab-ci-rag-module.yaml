###################### RAG MODULE CHILD PIPELINE — RELEASE BRANCH ######################
include:
  - local: '/.gitlab/.gitlab-templates.yaml'
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- build
- build-verifier
- restart
- push

variables:
  KANIKO_IMAGE: "gcr.io/kaniko-project/executor:v1.23.2-debug"

#################
# Fetch Config  #
#################
# OPENK9_VERSION reflects the value in python_modules_config.txt (e.g. 3.0.3-SNAPSHOT).
# On tag pipelines we use $CI_COMMIT_TAG instead, so keep this only for branch builds.
Fetch config:
  stage: build
  image: alpine:3.16
  script:
  - apk add --no-cache grep
  - VERSION=$(grep '^OPENK9_VERSION=' python_modules_config.txt | cut -d '=' -f2)
  - PYTHON_BASE_DOCKER_IMAGE=$(grep '^PYTHON_BASE_DOCKER_IMAGE=' python_modules_config.txt | cut -d '=' -f2)
  - echo "VERSION=$VERSION" > "$CI_PROJECT_DIR/config.env"
  - echo "PYTHON_BASE_DOCKER_IMAGE=$PYTHON_BASE_DOCKER_IMAGE" >> "$CI_PROJECT_DIR/config.env"
  artifacts:
    paths:
    - config.env
    expire_in: 1 day
  rules:
    - !reference [.rules:child-build-always, rules]

######################## BUILD RAG RELEASE (KANIKO) ########################
# Push 3.0.x  → image:<VERSION-from-config>  (e.g. 3.0.3-SNAPSHOT)
# Tag 3.0.N   → image:<CI_COMMIT_TAG>        (e.g. 3.0.1)
Build Rag Release:
  stage: build
  image:
    name: $KANIKO_IMAGE
    entrypoint: [""]
  needs:
  - job: Fetch config
    artifacts: true
  cache:
    key: "shared-pip"
    paths:
    - .pip-cache/
    policy: pull-push
  before_script:
  - mkdir -p .pip-cache
  script:
  - source $CI_PROJECT_DIR/config.env
  - mkdir -p /kaniko/.docker
  - |
    REGISTRY_AUTH=$(printf "%s:%s" "${CI_REGISTRY_USERNAME}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')
    DOCKERHUB_AUTH=$(printf "%s:%s" "${DOCKER_HUB_USER}" "${DOCKER_HUB_PASSWORD}" | base64 | tr -d '\n')
    printf '{"auths":{"registry.smc.it:49083":{"auth":"%s"},"https://index.docker.io/v1/":{"auth":"%s"}}}' \
      "${REGISTRY_AUTH}" "${DOCKERHUB_AUTH}" > /kaniko/.docker/config.json
  - |
    KANIKO_CACHE_FLAGS="--cache=true --cache-repo=kaniko-cache-registry.openk9.io/kaniko-cache --cache-ttl=72h --snapshot-mode=redo --compressed-caching=false"
    KANIKO_CONTEXT="--context ${CI_PROJECT_DIR}/ai-packages/rag-module --dockerfile ${CI_PROJECT_DIR}/ai-packages/rag-module/Dockerfile"

    if [ -n "$CI_COMMIT_TAG" ]; then
      IMAGE_TAG="$CI_COMMIT_TAG"
      echo "[RAG Release] Tag: push $IMAGE_TAG"
    else
      IMAGE_TAG="$VERSION"
      echo "[RAG Release] Branch: push $IMAGE_TAG"
    fi

    /kaniko/executor $KANIKO_CACHE_FLAGS $KANIKO_CONTEXT \
      --destination "${CI_REGISTRY_NAME}/openk9/openk9-rag-module:$IMAGE_TAG"
  rules:
    - !reference [.rules:child-build-release, rules]

######################## BUILD VERIFIER RAG ########################
Build Verifier Rag:
  stage: build-verifier
  image: python:3.12-slim
  script:
  - echo "=== Python syntax check for rag-module ==="
  - find ai-packages/rag-module -name "*.py" -not -path "*/__pycache__/*" | xargs python3 -m py_compile
  - echo "=== Syntax check passed ==="
  rules:
    - !reference [.rules:child-verify-release-mr, rules]
    - !reference [.rules:child-verify-porting-push, rules]

######################## TRIGGER RESTART RAG (push 3.0.x only) ########################
Trigger Restart Rag Release:
  extends: .restart_job_template
  variables:
    COMPONENT_NAME: "rag-module"
    COMPONENT_TYPE: "ai"
    TARGET_ENV: "k9-stable-2"
  needs:
  - job: Fetch config
    artifacts: true
  - job: Build Rag Release
    artifacts: false
  rules:
    - !reference [.rules:child-restart-release, rules]

######################## COPY TO DOCKER HUB (tag only) ########################
Copy Rag Module to DockerHub:
  extends: .skopeo-copy-to-dockerhub
  variables:
    REGISTRY_COMPONENT_NAME: "openk9-rag-module"
  needs:
    - job: Fetch config
      artifacts: true
    - job: Build Rag Release
      artifacts: false
  rules:
    - !reference [.rules:child-skopeo-release, rules]
