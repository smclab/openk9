###################### API-GATEWAY CHILD PIPELINE ######################
include:
  - local: '/.gitlab/.gitlab-templates.yaml'
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- build
- build-verifier
- container-scanning
- restart

# API Gateway is Spring Boot (NOT Quarkus).
# It uses JIB directly (mvn jib:build) instead of the Quarkus container-image
# extension. Therefore it cannot use .maven-build-logic (which passes
# -Dquarkus.container-image.push flags). It uses .springboot-build-logic instead.

######################## BUILD API-GATEWAY ########################
Build API-Gateway Image:
  extends: .build_template
  image: maven:3.9.6-eclipse-temurin-21
  variables:
    COMPONENT: "api-gateway"
    REGISTRY_IMAGE: "$CI_REGISTRY_NAME/openk9/openk9-api-gateway"
  stage: build
  script:
  - !reference [.springboot-build-logic, script]
  artifacts:
    paths:
    - .version
    expire_in: 24 hours
  rules:
    # Push image only on main/tag/feature branch - NOT on MR
    - !reference [.rules:child-deploy-main-tag, rules]
    - !reference [.rules:child-restart-feature, rules]

######################## BUILD VERIFIER ########################
Build Verifier API-Gateway:
  extends: .springboot-verifier-template
  image: maven:3.9.6-eclipse-temurin-21
  stage: build-verifier
  variables:
    COMPONENT: "api-gateway"
  rules:
    - !reference [.rules:child-verify-mr, rules]

#################### CONTAINER SCANNING API-GATEWAY ####################
Container Scanning API-Gateway:
  dependencies: [ Build API-Gateway Image ]
  extends: .container-scanning-template
  variables:
    REGISTRY_COMPONENT_NAME: "openk9-api-gateway"
  rules:
    - !reference [.rules:child-deploy-main-tag, rules]

##################### TRIGGER RESTART API-GATEWAY #####################
Trigger Restart API-Gateway:
  extends: .restart_job_template
  dependencies:
  - Build API-Gateway Image
  variables:
    COMPONENT_NAME: "api-gateway"
    COMPONENT_TYPE: "backend"
  rules:
    - !reference [.rules:child-deploy-main-tag, rules]
    - !reference [.rules:child-restart-feature, rules]
