###################### TALK-TO CHILD PIPELINE — RELEASE BRANCH ######################
include:
  - local: "/.gitlab/.gitlab-templates.yaml"
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- build
- build-verifier
- container-scanning
- restart
- push

#################
# Fetch Version #
#################
Fetch version:
  stage: build
  image: node:22.14.0-alpine
  script:
  - cd js-packages/talk-to
  - export VERSION=$(node -p "require('./package.json').version")
  - echo "VERSION=$VERSION" > $CI_PROJECT_DIR/version.env
  artifacts:
    paths:
    - version.env
    expire_in: 1 day
  rules:
    - !reference [.rules:child-build-always, rules]

######################## BUILD TALK-TO RELEASE (KANIKO) ########################
Build Talk-To Release:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [ "" ]
  variables:
    DOCKER_CONFIG: "/kaniko/.docker"
  needs:
  - job: Fetch version
    artifacts: true
  script:
  - export NODE_OPTIONS="--max-old-space-size=8192"
  - mkdir -p /kaniko/.docker
  - |
    REGISTRY_AUTH=$(printf "%s:%s" "${CI_REGISTRY_USERNAME}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')
    DOCKERHUB_AUTH=$(printf "%s:%s" "${DOCKER_HUB_USER}" "${DOCKER_HUB_PASSWORD}" | base64 | tr -d '\n')
    printf '{"auths":{"registry.smc.it:49083":{"auth":"%s"},"https://index.docker.io/v1/":{"auth":"%s"}}}' \
      "${REGISTRY_AUTH}" "${DOCKERHUB_AUTH}" > /kaniko/.docker/config.json
  - |
    if [[ -n "$CI_COMMIT_TAG" ]]; then
      KANIKO_PUSH="--destination $CI_REGISTRY_NAME/openk9/openk9-talk-to:$CI_COMMIT_TAG"
      echo "=== Release tag: push $CI_COMMIT_TAG ==="
    else
      source $CI_PROJECT_DIR/version.env
      KANIKO_PUSH="--destination $CI_REGISTRY_NAME/openk9/openk9-talk-to:$VERSION"
      echo "=== Release branch: push $VERSION ==="
    fi
  - |
    /kaniko/executor \
      --cache=true \
      --cache-repo=kaniko-cache-registry.openk9.io/kaniko-cache \
      --cache-ttl=72h \
      --snapshot-mode=redo \
      --compressed-caching=false \
      --context "${CI_PROJECT_DIR}" \
      --dockerfile "${CI_PROJECT_DIR}/js-packages/talk-to/Dockerfile" \
      $KANIKO_PUSH \
      --build-arg NODE_OPTIONS="--max-old-space-size=8192"
  rules:
    - !reference [.rules:child-build-release, rules]

######################## BUILD VERIFIER (yarn install + lerna build) ########################
Build Verifier Talk-To:
  stage: build-verifier
  image: node:22.14.0
  cache:
    - key:
        prefix: "shared-yarn"
        files:
          - yarn.lock
      paths:
        - .yarn-cache
      policy: pull
    - key:
        prefix: "talk-to-nm"
        files:
          - js-packages/talk-to/package.json
      paths:
        - js-packages/talk-to/node_modules
      policy: pull
  script:
  - export NODE_OPTIONS="--max-old-space-size=8192"
  - yarn config set registry https://registry.npmjs.org/
  - yarn config set network-timeout 600000
  - yarn config set cache-folder .yarn-cache
  - yarn install --prefer-offline --frozen-lockfile
  - CI=false npx lerna run build --scope talk-to
  rules:
    - !reference [.rules:child-verify-release-mr, rules]
    - !reference [.rules:child-verify-porting-push, rules]

######################## CONTAINER SCANNING (push 3.0.x only) ########################
Container Scanning Talk-To:
  extends: .container-scanning-template
  needs:
  - job: Fetch version
    artifacts: true
  - job: Build Talk-To Release
    artifacts: false
  variables:
    REGISTRY_COMPONENT_NAME: "openk9-talk-to"
  rules:
    - !reference [.rules:child-restart-release, rules]

######################## TRIGGER RESTART (push 3.0.x only) ########################
Trigger Restart Talk-To Release:
  extends: .restart_job_template
  dependencies:
  - Fetch version
  variables:
    COMPONENT_NAME: "talk-to"
    COMPONENT_TYPE: "frontend"
    TARGET_ENV: "k9-stable-2"
  rules:
    - !reference [.rules:child-restart-release, rules]

######################## COPY TO DOCKER HUB (tag only) ########################
Copy Talk-To to DockerHub:
  extends: .skopeo-copy-to-dockerhub
  variables:
    REGISTRY_COMPONENT_NAME: "openk9-talk-to"
  needs:
    - job: Fetch version
      artifacts: true
    - job: Build Talk-To Release
      artifacts: false
  rules:
    - !reference [.rules:child-skopeo-release, rules]
