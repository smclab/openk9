###################### TALK-TO PIPELINE ######################
include:
  - local: "/.gitlab/.gitlab-templates.yaml"
  # NEW: Include standardized child rules
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- build
- build-verifier
- container-scanning
- dependency-check
- restart

#################
# Fetch Version #
#################
Fetch version:
  stage: build
  image: node:22.14.0-alpine
  script:
  - cd js-packages/talk-to
  - export VERSION=$(node -p "require('./package.json').version")
  - echo "VERSION=$VERSION" > $CI_PROJECT_DIR/version.env
  artifacts:
    paths:
    - version.env
    expire_in: 1 day
  rules:
    # Always run if triggered
    - !reference [.rules:child-build-always, rules]

######################## BUILD TALK-TO ########################
Build Talk-To:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [ "" ]
  variables:
    DOCKER_CONFIG: "/kaniko/.docker"
  needs:
  - job: Fetch version
    artifacts: true
  script:
  # Docker credentials configuration
  - export NODE_OPTIONS="--max-old-space-size=8192"
  - mkdir -p /kaniko/.docker
  - |
    echo "{\"auths\":{\"registry.smc.it:49083\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USERNAME}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"},\"https://index.docker.io/v1/\":{\"auth\":\"$(printf "%s:%s" "${DOCKER_HUB_USER}" "${DOCKER_HUB_PASSWORD}" | base64 | tr -d '\n')\"}}}" \
    > /kaniko/.docker/config.json

  # Conditional logic to determine which tag to use
  - |
    if [[ "$CI_COMMIT_BRANCH" == "main" ]]; then
      # For main, use version from package.json
      source $CI_PROJECT_DIR/version.env
      echo "=== Building Talk-To with VERSION=$VERSION ==="
      DOCKER_TAG="$VERSION"
    elif [[ "$CI_COMMIT_BRANCH" =~ ^[0-9]+-.*$ ]]; then
      # For feature branch, determine tag based on user
      if [[ "$GITLAB_USER_LOGIN" == "lorenzo.venneri" || "$GITLAB_USER_LOGIN" == "giorgio.bartolomeo" ]]; then 
        DOCKER_TAG="996-SNAPSHOT"
        echo "=== Building Talk-To with VERSION=$DOCKER_TAG for frontend developer ==="
      else
        DOCKER_TAG="999-SNAPSHOT"
        echo "=== Building Talk-To with VERSION=$DOCKER_TAG for feature branch ==="
      fi
    fi

  # Execute build with the previously determined tag
  - |
    # ── Kaniko layer cache (added 2026-02) ────────────────────────────────────────
    # --cache=true         abilita il Docker layer cache
    # --cache-repo         registry:2 su MinIO (k9-requirements, bucket: kaniko-cache)
    #                      evita di riempire il registry SMC con layer temporanei
    # --cache-ttl=168h     layer più vecchi di 7 giorni vengono ignorati
    #                      coerente con il MinIO lifecycle TTL sul bucket
    # --snapshot-mode=redo usa mtime invece di sha256 per rilevare cambiamenti
    #                      riduce "Taking snapshot of full filesystem" da ~900s a ~5s
        # --compressed-caching=false evita l'errore OOM (exit code 137) disabilitando
        #                      la compressione in RAM dei layer giganti (es. PyTorch)
    # ──────────────────────────────────────────────────────────────────────────────
    /kaniko/executor \
      --cache=true \
      --cache-repo=kaniko-cache-registry.openk9.io/kaniko-cache \
      --cache-ttl=168h \
      --snapshot-mode=redo \
      --compressed-caching=false \
      --context "${CI_PROJECT_DIR}" \
      --dockerfile "${CI_PROJECT_DIR}/js-packages/talk-to/Dockerfile" \
      --destination "$CI_REGISTRY_NAME/openk9/openk9-talk-to:$DOCKER_TAG" \
      --build-arg NODE_OPTIONS="--max-old-space-size=8192"
  rules:
    # Run build only on push (main, tag, feature branch) - NO MR
    - !reference [.rules:child-deploy-main-tag, rules]
    - !reference [.rules:child-restart-feature, rules]

######################## BUILD VERIFIER ########################
Build Verifier:
  stage: build-verifier
  image: node:22.14.0
  cache:
    key: "${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}"
    paths:
    - js-packages/talk-to/node_modules
    - .yarn-cache
    policy: pull-push
  script:
  - export NODE_OPTIONS="--max-old-space-size=8192"
  # Disable workspace strict root check to ensure Lerna aggregates smoothly
  - yarn config set registry https://registry.npmjs.org/
  - yarn config set network-timeout 600000
  - yarn config set cache-folder .yarn-cache
  # 1. Install all dependencies from the project root (solves workspace-aggregator timeouts)
  - yarn install --prefer-offline --frozen-lockfile
  # 2. Build ONLY the specific component using Lerna scope
  - CI=false npx lerna run build --scope talk-to
  rules:
    # Run only on MR
    - !reference [.rules:child-verify-mr, rules]

######################## CONTAINER SCANNING ########################
Container Scanning:
  stage: container-scanning
  image: $CI_TEMPLATE_REGISTRY_HOST/security-products/container-scanning:7
  dependencies:
  - "Fetch version"
  - "Build Talk-To"
  script:
  - source version.env
  - echo "=== Scanning image $CI_REGISTRY_NAME/openk9/openk9-talk-to:$VERSION ==="
  - gtcs scan --image "$CI_REGISTRY_NAME/openk9/openk9-talk-to:$VERSION"
  rules:
    # Run only on Main/Tag
    - !reference [.rules:child-deploy-main-tag, rules]

######################## TRIGGER RESTART ########################
Trigger Restart:
  extends: .restart_job_template
  dependencies:
  - Fetch version
  variables:
    COMPONENT_NAME: "talk-to"
    COMPONENT_TYPE: "frontend"
  rules:
    # Run on Main/Tag and Feature
    - !reference [.rules:child-deploy-main-tag, rules]
    - !reference [.rules:child-restart-feature, rules]

####################### DEPENDENCY CHECK #######################
Dependency Check Talk-To:
  stage: dependency-check
  needs:
  - job: Fetch version
  - job: Build Verifier
    optional: true
  extends: .dependency_check_frontend_template
  allow_failure: true
  variables:
    # Tell the npm-audit analyzer to scan only the talk-to subdirectory,
    # NOT the monorepo root. Without this, the analyzer finds the root yarn.lock
    # and tries to install ALL workspace packages → segfault in yarn 1.22.5
    DS_PROJECT_DIR: "js-packages/talk-to"
  script:
  - yarn config set registry https://registry.npmjs.org/
  - yarn config set network-timeout 600000
  - /analyzer run