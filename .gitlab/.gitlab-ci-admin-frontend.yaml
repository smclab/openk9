###################### ADMIN FRONTEND PIPELINE ######################
include:
  - local: "/.gitlab/.gitlab-templates.yaml"
  # NEW: Include standardized child rules
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- build
- build-verifier
- container-scanning
- dependency-check
- restart
- publish

#################
# Fetch Version #
#################
Fetch version:
  stage: build
  image: node:20.9.0-alpine
  script:
  - cd js-packages/admin-ui
  - export VERSION=$(node -p "require('./package.json').version")
  - echo "VERSION=$VERSION" > $CI_PROJECT_DIR/version.env
  artifacts:
    paths:
    - version.env
    expire_in: 1 day
  rules:
    # Always run if triggered
    - !reference [.rules:child-build-always, rules]

######################## BUILD Admin FRONTEND ########################
Build Admin Frontend:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [ "" ]
  variables:
    DOCKER_CONFIG: "/kaniko/.docker"
  needs:
  - job: Fetch version
    artifacts: true
  script:
  # Docker credentials configuration
  - export NODE_OPTIONS="--max-old-space-size=8192"
  - mkdir -p /kaniko/.docker
  - |
    echo "{\"auths\":{\"registry.smc.it:49083\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USERNAME}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" \
    > /kaniko/.docker/config.json

  # Conditional logic to determine which tag to use
  - |
    if [[ "$CI_COMMIT_BRANCH" == "main" ]]; then
      # For main, use version from package.json
      source $CI_PROJECT_DIR/version.env
      echo "=== Building Admin UI with VERSION=$VERSION ==="
      DOCKER_TAG="$VERSION"
    elif [[ "$CI_COMMIT_BRANCH" =~ ^[0-9]+-.*$ ]]; then
      # For feature branch, use 996-SNAPSHOT
      echo "=== Building Admin UI with VERSION=996-SNAPSHOT for feature branch ==="
      DOCKER_TAG="996-SNAPSHOT"
    fi

  # Execute build with the previously determined tag
  - |
    /kaniko/executor \
      --context "${CI_PROJECT_DIR}" \
      --dockerfile "${CI_PROJECT_DIR}/js-packages/admin-ui/Dockerfile" \
      --destination "$CI_REGISTRY_NAME/openk9/admin-ui:$DOCKER_TAG" \
      --build-arg NODE_OPTIONS="--max-old-space-size=8192"
  rules:
    # Run build only on push (main, tag, feature branch) - NO MR
    - !reference [.rules:child-deploy-main-tag, rules]
    - !reference [.rules:child-restart-feature, rules]

######################## BUILD VERIFIER ########################
Build Verifier:
  stage: build-verifier
  image: node:20.9.0
  cache:
    key: "${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}"
    paths:
    - js-packages/admin-ui/node_modules
    - .yarn-cache
    policy: pull-push
  script:
  - cd js-packages/admin-ui
  - export NODE_OPTIONS="--max-old-space-size=8192"
  - yarn config set registry https://registry.npmjs.org/
  - yarn config set network-timeout 600000
  - yarn config set cache-folder ../../.yarn-cache
  - yarn install --prefer-offline --frozen-lockfile
  - yarn build
  rules:
    # Run only on MR
    - !reference [.rules:child-verify-mr, rules]

######################## CONTAINER SCANNING ########################
Container Scanning:
  stage: container-scanning
  image: $CI_TEMPLATE_REGISTRY_HOST/security-products/container-scanning:latest
  dependencies:
  - "Fetch version"
  - "Build Admin Frontend"
  script:
  - source version.env
  - echo "=== Scanning image $CI_REGISTRY_NAME/openk9/admin-ui:$VERSION ==="
  - gtcs scan --image "$CI_REGISTRY_NAME/openk9/admin-ui:$VERSION"
  rules:
    # Run only on Main/Tag
    - !reference [.rules:child-deploy-main-tag, rules]

######################## TRIGGER RESTART ########################
Trigger Restart:
  extends: .restart_job_template
  dependencies:
  - Fetch version
  variables:
    COMPONENT_NAME: "admin-ui"
    COMPONENT_TYPE: "frontend"
  rules:
    # Run on Main/Tag and Feature
    - !reference [.rules:child-deploy-main-tag, rules]
    - !reference [.rules:child-restart-feature, rules]

####################### DEPENDENCY CHECK #######################
Dependency Check Admin UI:
  stage: dependency-check
  extends: .dependency_check_frontend_template
  allow_failure: true
  script:
  - cd js-packages/admin-ui
  - /analyzer run
# Rules for dependency check are in the template, which uses standard logic.
# But template uses 'changes' filter. It should be fine as parent already filtered changes.
# Actually, the template .dependency_check_frontend_template also has rules!
# We might need to override them if they are too restrictive, but they seem to be Main/MR based.
# Let's keep it as extended.
