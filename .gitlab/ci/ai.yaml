# ================================
# AI & ML Modules Triggers
# ================================
# NOTE: YAML Anchors (&name) are used to define change lists once,
# and Aliases (*name) are used to reuse them in subsequent rules.

Trigger Rag Module:
  stage: trigger
  rules:
    # Prevent massive pipeline spam on initial branch creation (SHA 0000...)
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BEFORE_SHA == "0000000000000000000000000000000000000000"'
      when: never
    # 1. Main Branch Rule - DEFINES the changes list (&rag_module_changes)
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: &rag_module_changes
        - ai-packages/rag-module/**/*
    # 2. Tag Rule - always run, no changes filter (tag = full release)
    - if: '$CI_COMMIT_TAG'
    # 3. Feature Branch Rule - REUSES changes list (*rag_module_changes)
    # MR Rule - REUSES changes list (Build/Test only)
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *rag_module_changes
    - if: '$CI_COMMIT_BRANCH =~ /^[0-9]+-.*$/'
      changes: *rag_module_changes
  trigger:
    include: "/.gitlab/.gitlab-ci-rag-module.yaml"
    strategy: depend

