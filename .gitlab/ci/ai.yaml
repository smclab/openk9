# ================================
# AI & ML Modules Triggers — RELEASE BRANCH (3.0.x)
# ================================
#
# Each trigger fires only on the four release-branch contexts:
#
#   1. push 3.0.x          → Build Release + Restart Release (k9-stable-2)
#   2. tag 3.0.N           → Build Release + Skopeo to Docker Hub
#   3. push porting-*      → Build Verifier (compile only)         [PORTING_PUSH=true]
#   4. MR porting- → 3.0.x → Build Verifier (compile only, 1 only) [RELEASE_MR=true]
#
# Cross-domain users (backend: mirko/michele, frontend: lorenzo/giorgio) are
# excluded from porting-* rules — AI pipelines do not run for them.

Trigger Rag Module:
  stage: trigger
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BEFORE_SHA == "0000000000000000000000000000000000000000"'
      when: never
    - if: '$CI_COMMIT_BRANCH =~ /^\d+\.\d+\.x$/'
      changes: &rag_module_changes
        - ai-packages/rag-module/**/*
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+/'
    - if: '$CI_COMMIT_BRANCH =~ /^porting-/ && $GITLAB_USER_LOGIN != "mirko.zizzari" && $GITLAB_USER_LOGIN != "michele.bastianelli" && $GITLAB_USER_LOGIN != "lorenzo.venneri" && $GITLAB_USER_LOGIN != "giorgio.bartolomeo"'
      changes: *rag_module_changes
      variables:
        PORTING_PUSH: "true"
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^\d+\.\d+\.x$/ && $GITLAB_USER_LOGIN != "mirko.zizzari" && $GITLAB_USER_LOGIN != "michele.bastianelli" && $GITLAB_USER_LOGIN != "lorenzo.venneri" && $GITLAB_USER_LOGIN != "giorgio.bartolomeo"'
      changes: *rag_module_changes
      variables:
        RELEASE_MR: "true"
  trigger:
    include: "/.gitlab/.gitlab-ci-rag-module.yaml"
    strategy: depend

Trigger Embedding Modules:
  stage: trigger
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BEFORE_SHA == "0000000000000000000000000000000000000000"'
      when: never
    - if: '$CI_COMMIT_BRANCH =~ /^\d+\.\d+\.x$/'
      changes: &embedding_modules_changes
        - ai-packages/embedding-modules/**/*
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+/'
    - if: '$CI_COMMIT_BRANCH =~ /^porting-/ && $GITLAB_USER_LOGIN != "mirko.zizzari" && $GITLAB_USER_LOGIN != "michele.bastianelli" && $GITLAB_USER_LOGIN != "lorenzo.venneri" && $GITLAB_USER_LOGIN != "giorgio.bartolomeo"'
      changes: *embedding_modules_changes
      variables:
        PORTING_PUSH: "true"
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^\d+\.\d+\.x$/ && $GITLAB_USER_LOGIN != "mirko.zizzari" && $GITLAB_USER_LOGIN != "michele.bastianelli" && $GITLAB_USER_LOGIN != "lorenzo.venneri" && $GITLAB_USER_LOGIN != "giorgio.bartolomeo"'
      changes: *embedding_modules_changes
      variables:
        RELEASE_MR: "true"
  trigger:
    include: "/.gitlab/.gitlab-ci-embedding-module.yaml"
    strategy: depend
