# Centralized Rules Configuration
# Used by trigger jobs to determine execution context

.rules:standard-trigger:
  rules:
    # Prevent massive pipeline spam on initial branch creation (SHA 0000...)
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BEFORE_SHA == "0000000000000000000000000000000000000000"'
      when: never
    # Case 1: Push on main branch
    - if: '$CI_COMMIT_BRANCH == "main"'
    # Case 2: Approved Merge Request event
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_APPROVED == "true"'
    # Case 3: Tag creation (Release)
    - if: "$CI_COMMIT_TAG"

.rules:feature-trigger:
  rules:
    # Case 4: Feature branch matching pattern OR dev test user
    - if: '$CI_COMMIT_BRANCH =~ /^[0-9]+-.*$/ || $GITLAB_USER_LOGIN == "dmytro.kozak"'
