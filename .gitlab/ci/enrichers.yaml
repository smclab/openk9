# ================================
# Enrichers Triggers
# ================================
# Enrichers are data-transformation processors (not ML models).
# They live under enrichers/** and are kept separate from ai-packages/**.
#
# NOTE: YAML Anchors (&name) are used to define change lists once,
# and Aliases (*name) are used to reuse them in subsequent rules.
#
# USER_TYPE variable passed to child pipelines:
#   "designated" → luca.callocchia: full pipeline (build + push + restart)
#   "generic"    → any other user: Build Verifier only (no push, no restart)
# MR and main/tag rules do NOT set USER_TYPE (handled by child-rules defaults).

Trigger Docling Processor:
  stage: trigger
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BEFORE_SHA == "0000000000000000000000000000000000000000"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: &docling_processor_changes
        - enrichers/docling-processor/**/*
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *docling_processor_changes
    - if: '$CI_COMMIT_BRANCH =~ /^[0-9]+-.*$/ && $GITLAB_USER_LOGIN == "luca.callocchia"'
      changes: *docling_processor_changes
      variables:
        USER_TYPE: "designated"
    - if: '$CI_COMMIT_BRANCH =~ /^[0-9]+-.*$/'
      changes: *docling_processor_changes
      variables:
        USER_TYPE: "generic"
  trigger:
    include: "/.gitlab/.gitlab-ci-docling-processor.yaml"
    strategy: depend
