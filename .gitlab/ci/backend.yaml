# ================================
# Backend Modules Triggers
# ================================
# NOTE: YAML Anchors (&name) are used to define change lists once,
# and Aliases (*name) are used to reuse them in subsequent rules.
#
# USER_TYPE variable passed to child pipelines:
#   "designated" → mirko/michele: full pipeline (build + push + restart)
#   "generic"    → any other user: Build Verifier only (compile check, no push)
# MR and main/tag rules do NOT set USER_TYPE (handled by child-rules defaults).

Trigger Datasource:
  stage: trigger
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BEFORE_SHA == "0000000000000000000000000000000000000000"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: &datasource_changes
        - core/app/datasource/**/*
        - core/service/**/*
        - core/common/graphql-util/**/*
        - core/common/model/**/*
        - core/common/resources-common/**/*
        - core/common/util/**/*
        - core/client/common/**/*
        - core/client/grpc/**/*
        - core/api/tenant-manager-api/**/*
        - core/common/datasource-model/**/*
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *datasource_changes
    - if: '$CI_COMMIT_BRANCH =~ /^[0-9]+-.*$/ && ($GITLAB_USER_LOGIN == "mirko.zizzari" || $GITLAB_USER_LOGIN == "michele.bastianelli")'
      changes: *datasource_changes
      variables:
        USER_TYPE: "designated"
    - if: '$CI_COMMIT_BRANCH =~ /^[0-9]+-.*$/'
      changes: *datasource_changes
      variables:
        USER_TYPE: "generic"
  trigger:
    include: "/.gitlab/.gitlab-ci-datasource.yaml"
    strategy: depend

