# ================================
# Backend Modules Triggers — RELEASE BRANCH (3.0.x)
# ================================
#
# Each trigger fires only on the four release-branch contexts:
#
#   1. push 3.0.x          → Build Release + Restart Release (k9-stable-2)
#   2. tag 3.0.N           → Build Release + Skopeo to Docker Hub
#   3. push porting-*      → Build Verifier (compile only)         [PORTING_PUSH=true]
#   4. MR porting- → 3.0.x → Build Verifier (compile only, 1 only) [RELEASE_MR=true]
#
# Cross-domain users (frontend: lorenzo/giorgio, AI: luca) are excluded from
# porting-* rules (push and MR) — they are not responsible for backend changes,
# their pushes/MRs do not trigger this domain.
#
# YAML Anchors (&name) define change lists once; Aliases (*name) reuse them.

Trigger Datasource:
  stage: trigger
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BEFORE_SHA == "0000000000000000000000000000000000000000"'
      when: never
    # 1. push release branch
    - if: '$CI_COMMIT_BRANCH =~ /^\d+\.\d+\.x$/'
      changes: &datasource_changes
        - core/app/datasource/**/*
        - core/service/**/*
        - core/common/graphql-util/**/*
        - core/common/model/**/*
        - core/common/resources-common/**/*
        - core/common/util/**/*
        - core/client/common/**/*
        - core/client/grpc/**/*
        - core/api/tenant-manager-api/**/*
        - core/common/datasource-model/**/*
    # 2. release tag
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
    # 3. push porting-*
    - if: '$CI_COMMIT_BRANCH =~ /^porting-/ && $GITLAB_USER_LOGIN != "luca.callocchia" && $GITLAB_USER_LOGIN != "lorenzo.venneri" && $GITLAB_USER_LOGIN != "giorgio.bartolomeo"'
      changes: *datasource_changes
      variables:
        PORTING_PUSH: "true"
    # 4. MR porting-* → release branch
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^\d+\.\d+\.x$/ && $GITLAB_USER_LOGIN != "luca.callocchia" && $GITLAB_USER_LOGIN != "lorenzo.venneri" && $GITLAB_USER_LOGIN != "giorgio.bartolomeo"'
      changes: *datasource_changes
      variables:
        RELEASE_MR: "true"
  trigger:
    include: "/.gitlab/.gitlab-ci-datasource.yaml"
    strategy: depend

