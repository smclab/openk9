# ================================
# Backend Modules Triggers
# ================================
# NOTE: YAML Anchors (&name) are used to define change lists once,
# and Aliases (*name) are used to reuse them in subsequent rules.
#
# Each trigger has three feature-branch rules:
#
#   1. "designated" rule:
#      Fires only for backend-designated users (mirko.zizzari, michele.bastianelli).
#      Runs the full pipeline: build + push image + restart deployment.
#      USER_TYPE: "designated"
#
#   2. "generic" rule:
#      Fires for any user who is NOT a designated user of any domain
#      (i.e. not backend, frontend, or AI designated).
#      Runs build/compile only — no push, no restart. Useful to catch
#      compilation errors on branches touched by non-owner developers.
#      USER_TYPE: "generic"
#
#   3. Designated users of OTHER domains (frontend: lorenzo/giorgio, AI: luca)
#      are excluded from both rules above — their pipelines do NOT trigger
#      on backend changes, since they are not responsible for this domain.
#
# MR and main rules do NOT set USER_TYPE (handled by child-rules defaults).

Trigger Datasource:
  stage: trigger
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BEFORE_SHA == "0000000000000000000000000000000000000000"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: &datasource_changes
        - core/app/datasource/**/*
        - core/service/**/*
        - core/common/graphql-util/**/*
        - core/common/model/**/*
        - core/common/resources-common/**/*
        - core/common/util/**/*
        - core/client/common/**/*
        - core/client/grpc/**/*
        - core/api/tenant-manager-api/**/*
        - core/common/datasource-model/**/*
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *datasource_changes
    - if: '$CI_COMMIT_BRANCH =~ /^[0-9]+-.*$/ && ($GITLAB_USER_LOGIN == "mirko.zizzari" || $GITLAB_USER_LOGIN == "michele.bastianelli")'
      changes: *datasource_changes
      variables:
        USER_TYPE: "designated"
    - if: '$CI_COMMIT_BRANCH =~ /^[0-9]+-.*$/ && $GITLAB_USER_LOGIN != "mirko.zizzari" && $GITLAB_USER_LOGIN != "michele.bastianelli" && $GITLAB_USER_LOGIN != "lorenzo.venneri" && $GITLAB_USER_LOGIN != "giorgio.bartolomeo" && $GITLAB_USER_LOGIN != "luca.callocchia"'
      changes: *datasource_changes
      variables:
        USER_TYPE: "generic"
    # RELEASE: push/merge su release branch (3.0.x, 3.1.x, ...)
    - if: '$CI_COMMIT_BRANCH =~ /^\d+\.\d+\.x$/'
      changes: *datasource_changes
    # RELEASE MR: porting-* verso release branch — compile only
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^\d+\.\d+\.x$/ && $GITLAB_USER_LOGIN != "luca.callocchia" && $GITLAB_USER_LOGIN != "lorenzo.venneri" && $GITLAB_USER_LOGIN != "giorgio.bartolomeo"'
      changes: *datasource_changes
      variables:
        RELEASE_MR: "true"
  trigger:
    include: "/.gitlab/.gitlab-ci-datasource.yaml"
    strategy: depend

