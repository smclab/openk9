# ================================
# Backend Modules Triggers
# ================================
# NOTE: YAML Anchors (&name) are used to define change lists once,
# and Aliases (*name) are used to reuse them in subsequent rules.
#
# ISOLATION STRATEGY:
# The MR rule and the feature-branch rule are MERGED into a single condition.
# This ensures that ONLY the designated backend developers can trigger
# these pipelines, even when a Merge Request is open.
# Frontend/AI developers opening MRs will NOT accidentally trigger backend pipelines.

Trigger Datasource:
  stage: trigger
  rules:
    # Prevent massive pipeline spam on initial branch creation (SHA 0000...)
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BEFORE_SHA == "0000000000000000000000000000000000000000"'
      when: never
    # 1. Main Branch Rule - DEFINES the changes list (&datasource_changes)
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: &datasource_changes
        - core/app/datasource/**/*
        - core/common/resources-common/**/*
        - core/common/common-utils/**/*
    # 2. Tag Rule - always run, no changes filter (tag = full release)
    - if: '$CI_COMMIT_TAG'
    # 3. MR or Feature Branch Rule - only for backend developers
    - if: '($CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH =~ /^[0-9]+-.*$/) && ($GITLAB_USER_LOGIN == "mirko.zizzari" || $GITLAB_USER_LOGIN == "michele.bastianelli")'
      changes: *datasource_changes
  trigger:
    include: "/.gitlab/.gitlab-ci-datasource.yaml"
    strategy: depend

