# Standard rules for Child Pipelines
# These rules assume the parent pipeline has already decided "IF" to run.
# These rules decide "WHICH JOBS" to run within the child pipeline.
#
# ── HOW USER_TYPE WORKS ────────────────────────────────────────────────────────
#
# USER_TYPE is set by the PARENT trigger job (backend.yaml / frontend.yaml / ai.yaml)
# and passed down to the child pipeline as a variable. It controls what the child runs:
#
#   "designated" → set when the pusher is the domain owner (e.g. mirko/michele for backend,
#                  lorenzo/giorgio for frontend, luca for AI).
#                  Child runs: build Docker image + push to registry + restart deployment.
#
#   "generic"    → set when the pusher is NOT a designated user of ANY domain
#                  (e.g. mario.rossi touching any module).
#                  Child runs: build/compile only (no push, no restart).
#                  Purpose: catch compilation errors early on non-owner branches.
#
#   (unset)      → no USER_TYPE means the pipeline was triggered by main, tag, or MR.
#                  Child runs standard jobs as defined by child-deploy-main-tag / child-verify-mr.
#
# NOTE: designated users of OTHER domains are excluded entirely from the parent trigger
# (e.g. lorenzo modifying backend files → no pipeline starts at all).
# This avoids useless build-verifier runs for developers not responsible for that domain.
# ──────────────────────────────────────────────────────────────────────────────

.rules:child-build-always:
  rules:
    - when: on_success

.rules:child-deploy-main-tag:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

# Restart on main only — tags do NOT auto-restart (release deploy is handled
# manually via ArgoCD/ops, same policy as child-restart-release on N.N.x branches).
# Used by: Trigger Restart <X> jobs. Build/Scanning stay on child-deploy-main-tag.
.rules:child-restart-main:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# Restart and full build+push run only for DESIGNATED developers on feature branches
.rules:child-restart-feature:
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^[0-9]+-.*$/ && $USER_TYPE == "designated"'

# Build (no push) for GENERIC users on feature branches
.rules:child-build-feature-generic:
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^[0-9]+-.*$/ && $USER_TYPE == "generic"'

# Build Verifier runs on Merge Requests only (any user).
# Generic users on feature branches run the Build job (no push) via child-build-feature-generic —
# running Build Verifier on top would be redundant since the full Docker build already compiles.
.rules:child-verify-mr:
  rules:
    - if: '$CI_MERGE_REQUEST_IID'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    # In GitLab, parent-child pipelines have CI_PIPELINE_SOURCE="parent_pipeline".
    # Since predefined MR variables (like CI_MERGE_REQUEST_IID) are NOT passed to children,
    # we detect an MR child pipeline by the ABSENCE of a branch/tag
    - if: '$CI_PIPELINE_SOURCE == "parent_pipeline" && $CI_COMMIT_BRANCH == null && $CI_COMMIT_TAG == null'

# NOTE: child-publish and child-deploy-main-tag are currently identical.
# They are kept separate for semantic clarity (npm publish vs Docker deploy)
# and to allow future divergence (e.g. publish only on main, not on tag).
.rules:child-publish:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

# ── RELEASE BRANCH RULES ──────────────────────────────────────────────────────
#
# child-deploy-release: fires on push/merge to any release branch (3.0.x, 3.1.x, ...)
#   or on a release tag (3.0.1, 3.0.2, ...).
#   Used by: Build Release + Trigger Restart Release jobs.
#
# child-verify-release-mr: fires when the parent passes RELEASE_MR="true",
#   which happens on MR from porting-* toward a release branch.
#   Used by: Build Verifier Release MR jobs.
#
# The regex /^\d+\.\d+\.x$/ matches any future release branch automatically.
# The regex /^\d+\.\d+\.\d+/ matches any semver release tag.
# ──────────────────────────────────────────────────────────────────────────────

.rules:child-deploy-release:
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^\d+\.\d+\.x$/'

.rules:child-verify-release-mr:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "parent_pipeline" && $RELEASE_MR == "true"'
