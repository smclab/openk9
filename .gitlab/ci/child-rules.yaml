# Standard rules for Child Pipelines
# These rules assume the parent pipeline has already decided "IF" to run.
# These rules decide "WHICH JOBS" to run within the child pipeline.

.rules:child-build-always:
  rules:
    - when: on_success

.rules:child-deploy-main-tag:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

.rules:child-restart-feature:
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^[0-9]+-.*$/'

.rules:child-verify-mr:
  rules:
    - if: '$CI_MERGE_REQUEST_IID'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    # In GitLab, parent-child pipelines have CI_PIPELINE_SOURCE="parent_pipeline".
    # Since predefined MR variables (like CI_MERGE_REQUEST_IID) are NOT passed to children,
    # we detect an MR child pipeline by the ABSENCE of a branch/tag (which are present on push children)
    - if: '$CI_PIPELINE_SOURCE == "parent_pipeline" && $CI_COMMIT_BRANCH == null && $CI_COMMIT_TAG == null'

.rules:child-publish:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'
