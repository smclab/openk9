# Standard rules for Child Pipelines on RELEASE BRANCH (3.0.x).
# These rules assume the parent pipeline has already decided "IF" to run.
# These rules decide "WHICH JOBS" to run within the child pipeline.
#
# ── BRANCH MODEL ──────────────────────────────────────────────────────────────
#
# This branch (3.0.x) is the release line. Only four contexts trigger pipelines:
#
#   A) push 3.0.x       → Build Release + Restart Release (k9-stable-2)
#   B) tag 3.0.N        → Build Release + Skopeo to Docker Hub (no restart)
#   C) push porting-*   → Build Verifier (compile only, no push, no restart)
#   D) MR porting-* → 3.0.x → Build Verifier (compile only, no push, no restart)
#
# Feature branches [0-9]+-... and main builds DO NOT exist on this branch:
# they live on `main`. Cross-domain users are excluded at the parent level.
# ──────────────────────────────────────────────────────────────────────────────

.rules:child-build-always:
  rules:
    - when: on_success

# ── RELEASE BUILD ─────────────────────────────────────────────────────────────
# Used by: Build <X> Release jobs.
# Fires on push to release branch (3.0.x) AND on release tag (3.0.N).
.rules:child-build-release:
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^\d+\.\d+\.x$/'
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+/'

# ── RESTART (release branch only) ─────────────────────────────────────────────
# Used by: Trigger Restart <X> Release jobs.
# Fires ONLY on push to release branch (3.0.x). Tag releases do NOT auto-restart;
# production deploy is handled manually via ArgoCD/ops.
.rules:child-restart-release:
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^\d+\.\d+\.x$/'

# ── SKOPEO (Docker Hub copy) ──────────────────────────────────────────────────
# Used by: Copy <X> to DockerHub jobs.
# Fires ONLY on release tag (3.0.N). Branch SNAPSHOT builds stay on the internal
# registry only.
.rules:child-skopeo-release:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+/'

# ── VERIFY: MR porting-* → 3.0.x ──────────────────────────────────────────────
# Used by: Build Verifier <X> Release MR jobs.
# Parent passes RELEASE_MR="true" when the MR target is a release branch.
.rules:child-verify-release-mr:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "parent_pipeline" && $RELEASE_MR == "true"'

# ── VERIFY: push porting-* (no MR) ────────────────────────────────────────────
# Used by: Build Verifier <X> Porting Push jobs.
# Parent passes PORTING_PUSH="true" when the branch matches /^porting-/.
.rules:child-verify-porting-push:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "parent_pipeline" && $PORTING_PUSH == "true"'
