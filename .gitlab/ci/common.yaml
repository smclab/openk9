# ================================
# Common & Helm Triggers
# ================================

# CONNECTORS (Docker Build)
# Scatta SOLO su modifiche al codice del connector (connectors/<x>/connector/...),
# non al chart Helm (connectors/<x>/chart/...) — il chart è gestito da "Trigger Helm Connectors".
# Il pattern connectors/*/connector/**/* significa: una qualsiasi cartella dentro connectors/,
# poi la sotto-cartella "connector", poi qualsiasi file a qualsiasi livello.
Trigger Connectors Build:
  stage: trigger
  rules:
    - !reference [.rules:antispam-new-branch, rules]
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - connectors/*/connector/**/*
        - .gitlab/.gitlab-ci-connectors.yaml
    - if: '$CI_COMMIT_TAG'
    # Release branch (N.N.x) — push of connector code triggers a rebuild
    # (image goes to the internal registry as -SNAPSHOT, never to Docker Hub).
    - if: '$CI_COMMIT_BRANCH =~ /^\d+\.\d+\.x$/'
      changes:
        - connectors/*/connector/**/*
        - .gitlab/.gitlab-ci-connectors.yaml
    # Porting MR toward a release branch — verifier-only build, propagates RELEASE_MR.
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^\d+\.\d+\.x$/'
      changes:
        - connectors/*/connector/**/*
      variables:
        RELEASE_MR: "true"
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - connectors/*/connector/**/*
  trigger:
    include: "/.gitlab/.gitlab-ci-connectors.yaml"
    strategy: depend

# ================================
# Helm Charts Triggers
# ================================
# Consolidating triggers based on Helm Chart Pipeline files structure.
# Each trigger points to a specific group file in .gitlab/helm-charts-pipeline/
#
# POLICY (Issue #2160): charts are packaged/published ONLY from main or a tag
# (manual jobs). Release branches (N.N.x) and porting MRs must NOT spawn these
# children: the group files have no jobs for those contexts, so the child would
# be empty and the strategy:depend trigger would fail the whole pipeline.
# The release line publishes its charts when the release tag (vN.N.N) is cut.

# 1. Base Core (Ingestion, Datasource, Searcher, etc.)
Trigger Helm Base Core:
  stage: trigger
  rules:
    - !reference [.rules:antispam-new-branch, rules]
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - helm-charts/01-base-core/**/*
    - if: '$CI_COMMIT_TAG'
  trigger:
    include: "/.gitlab/helm-charts-pipeline/.gitlab-ci-01-base-core.yaml"
    strategy: depend

# 2. File Handling (File Manager, Tika)
Trigger Helm File Handling:
  stage: trigger
  rules:
    - !reference [.rules:antispam-new-branch, rules]
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - helm-charts/02-file-handling/**/*
    - if: '$CI_COMMIT_TAG'
  trigger:
    include: "/.gitlab/helm-charts-pipeline/.gitlab-ci-02-file-handling.yaml"
    strategy: depend

# 3. Gen AI (RAG, Chatbot, etc.)
Trigger Helm Gen AI:
  stage: trigger
  rules:
    - !reference [.rules:antispam-new-branch, rules]
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - helm-charts/03-gen-ai/**/*
    - if: '$CI_COMMIT_TAG'
  trigger:
    include: "/.gitlab/helm-charts-pipeline/.gitlab-ci-03-gen-ai.yaml"
    strategy: depend

# 4. Connectors (Helm Charts)
Trigger Helm Connectors:
  stage: trigger
  rules:
    - !reference [.rules:antispam-new-branch, rules]
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - connectors/*/chart/**/*
    - if: '$CI_COMMIT_TAG'
  trigger:
    include: "/.gitlab/helm-charts-pipeline/.gitlab-ci-05-connectors.yaml"
    strategy: depend

# 5. Utilities
Trigger Helm Utilities:
  stage: trigger
  rules:
    - !reference [.rules:antispam-new-branch, rules]
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - helm-charts/06-utilities/**/*
    - if: '$CI_COMMIT_TAG'
  trigger:
    include: "/.gitlab/helm-charts-pipeline/.gitlab-ci-06-utilities.yaml"
    strategy: depend

