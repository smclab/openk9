# ================================
# Common & Helm Triggers — RELEASE BRANCH (3.0.x)
# ================================

# CONNECTORS (Docker Build)
Trigger Connectors Build:
  stage: trigger
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BEFORE_SHA == "0000000000000000000000000000000000000000"'
      when: never
    - if: '$CI_COMMIT_BRANCH =~ /^\d+\.\d+\.x$/'
      changes:
        - connectors/**/*
        - .gitlab/.gitlab-ci-connectors.yaml
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+/'
    - if: '$CI_COMMIT_BRANCH =~ /^porting-/'
      changes:
        - connectors/**/*
      variables:
        PORTING_PUSH: "true"
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^\d+\.\d+\.x$/'
      changes:
        - connectors/**/*
      variables:
        RELEASE_MR: "true"
  trigger:
    include: "/.gitlab/.gitlab-ci-connectors.yaml"
    strategy: depend

# ================================
# Helm Charts Triggers — RELEASE BRANCH only
# ================================
# Helm charts on the release line are validated/published only on:
#   - push 3.0.x      (publish chart with branch SNAPSHOT version)
#   - tag 3.0.N       (publish chart with release version)
#   - MR porting-*    (validate chart, no publish)

# 1. Base Core (Ingestion, Datasource, Searcher, etc.)
Trigger Helm Base Core:
  stage: trigger
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BEFORE_SHA == "0000000000000000000000000000000000000000"'
      when: never
    - if: '$CI_COMMIT_BRANCH =~ /^\d+\.\d+\.x$/'
      changes:
        - helm-charts/01-base-core/**/*
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+/'
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^\d+\.\d+\.x$/'
      changes:
        - helm-charts/01-base-core/**/*
      variables:
        RELEASE_MR: "true"
  trigger:
    include: "/.gitlab/helm-charts-pipeline/.gitlab-ci-01-base-core.yaml"
    strategy: depend

