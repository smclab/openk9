# ================================
# Frontend Modules Triggers
# ================================
# NOTE: YAML Anchors (&name) are used to define change lists once,
# and Aliases (*name) are used to reuse them in subsequent rules.
#
# USER_TYPE variable passed to child pipelines:
#   "designated" → lorenzo/giorgio: full pipeline (build + push + restart)
#   "generic"    → any other user: Build Verifier only (compile check, no push)
# MR and main/tag rules do NOT set USER_TYPE (handled by child-rules defaults).

Trigger Search Frontend:
  stage: trigger
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BEFORE_SHA == "0000000000000000000000000000000000000000"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: &search_frontend_changes
        - js-packages/search-frontend/**/*
    - if: '$CI_COMMIT_TAG'
      changes: *search_frontend_changes
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        paths: *search_frontend_changes
        compare_to: 'refs/heads/main'
    - if: '$CI_COMMIT_BRANCH =~ /^[0-9]+-.*$/ && ($GITLAB_USER_LOGIN == "lorenzo.venneri" || $GITLAB_USER_LOGIN == "giorgio.bartolomeo")'
      changes:
        paths: *search_frontend_changes
        compare_to: 'refs/heads/main'
      variables:
        USER_TYPE: "designated"
    - if: '$CI_COMMIT_BRANCH =~ /^[0-9]+-.*$/'
      changes:
        paths: *search_frontend_changes
        compare_to: 'refs/heads/main'
      variables:
        USER_TYPE: "generic"
  trigger:
    include: "/.gitlab/.gitlab-ci-search-frontend.yaml"
    strategy: depend

