# ================================
# Frontend Modules Triggers — RELEASE BRANCH (3.0.x)
# ================================
#
# Each trigger fires only on the four release-branch contexts:
#
#   1. push 3.0.x          → Build Release + Restart Release (k9-stable-2)
#   2. tag 3.0.N           → Build Release + Skopeo to Docker Hub
#   3. push porting-*      → Build Verifier (compile only)         [PORTING_PUSH=true]
#   4. MR porting- → 3.0.x → Build Verifier (compile only, 1 only) [RELEASE_MR=true]
#
# Cross-domain users (backend: mirko/michele, AI: luca) are excluded from
# porting-* rules (push and MR) — frontend pipelines do not run for them.
#
# OpenK9-Chatbot exception: the npm library is published only from main, so
# its trigger fires only on porting-* (push/MR) for compile verification.

Trigger Search Frontend:
  stage: trigger
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BEFORE_SHA == "0000000000000000000000000000000000000000"'
      when: never
    - if: '$CI_COMMIT_BRANCH =~ /^\d+\.\d+\.x$/'
      changes: &search_frontend_changes
        - js-packages/search-frontend/**/*
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
    - if: '$CI_COMMIT_BRANCH =~ /^porting-/ && $GITLAB_USER_LOGIN != "mirko.zizzari" && $GITLAB_USER_LOGIN != "michele.bastianelli" && $GITLAB_USER_LOGIN != "luca.callocchia"'
      changes: *search_frontend_changes
      variables:
        PORTING_PUSH: "true"
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^\d+\.\d+\.x$/ && $GITLAB_USER_LOGIN != "mirko.zizzari" && $GITLAB_USER_LOGIN != "michele.bastianelli" && $GITLAB_USER_LOGIN != "luca.callocchia"'
      changes: *search_frontend_changes
      variables:
        RELEASE_MR: "true"
  trigger:
    include: "/.gitlab/.gitlab-ci-search-frontend.yaml"
    strategy: depend

