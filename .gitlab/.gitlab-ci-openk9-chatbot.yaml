###################### OPENK9-CHATBOT PIPELINE ######################
include:
  - local: "/.gitlab/.gitlab-templates.yaml"
  # NEW: Include standardized child rules
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- build
- build-verifier
- container-scanning
- publish
- dependency-check

#################
# Fetch Version #
#################
Fetch version:
  stage: build
  image: node:22.14.0-alpine
  script:
  - cd js-packages/openk9-chatbot
  - export VERSION=$(node -p "require('./package.json').version")
  - echo "VERSION=$VERSION" > $CI_PROJECT_DIR/version.env
  artifacts:
    paths:
    - version.env
    expire_in: 1 day
  rules:
    # Always run if triggered
    - !reference [.rules:child-build-always, rules]

######################## BUILD VERIFIER ########################
Build Verifier:
  stage: build-verifier
  image: node:22.14.0
  cache:
    key: "${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}"
    paths:
    - js-packages/openk9-chatbot/node_modules
    - .yarn-cache
    policy: pull-push
  needs:
  - job: Fetch version
    artifacts: true
  script:
  # Set Node memory limit to 8GB to prevent OOM
  - export NODE_OPTIONS="--max-old-space-size=8192"
  # Yarn configuration for resilience (from root scope)
  - yarn config set registry https://registry.npmjs.org/
  - yarn config set network-timeout 600000
  - yarn config set cache-folder .yarn-cache
  # 1. Install all dependencies from the project root (solves workspace timeout)
  - yarn install --prefer-offline --frozen-lockfile
  # 2. Build ONLY the specific component using Lerna scope
  - npx lerna run build --scope @openk9ui/openk9-chatbot
  rules:
    # Run on MR and Main
    - !reference [.rules:child-verify-mr, rules]

######################## BUILD OPENK9-CHATBOT (MAIN ONLY) ########################
Build OpenK9-Chatbot:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [ "" ]
  variables:
    DOCKER_CONFIG: "/kaniko/.docker"
  needs:
  - job: Fetch version
    artifacts: true
  script:
  # Docker credentials configuration
  - export NODE_OPTIONS="--max-old-space-size=8192"
  - mkdir -p /kaniko/.docker
  - |
    echo "{\"auths\":{\"registry.smc.it:49083\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USERNAME}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" \
    > /kaniko/.docker/config.json

  # Use version from package.json for main branch (Only runs on main)
  - source $CI_PROJECT_DIR/version.env
  - echo "=== Building OpenK9-Chatbot with VERSION=$VERSION ==="

  # Execute build
  - |
    /kaniko/executor \
      --context "${CI_PROJECT_DIR}" \
      --dockerfile "${CI_PROJECT_DIR}/js-packages/openk9-chatbot/Dockerfile" \
      --destination "$CI_REGISTRY_NAME/openk9/openk9-chatbot:$VERSION" \
      --build-arg NODE_OPTIONS="--max-old-space-size=8192" \
      --cache=true \
      --cache-repo="${CI_REGISTRY_NAME}/openk9/openk9-chatbot-cache" \
      --cache-ttl=168h
  rules:
    # Only run on main branch
    - !reference [.rules:child-deploy-main-tag, rules]

######################## CONTAINER SCANNING ########################
Container Scanning:
  stage: container-scanning
  image: $CI_TEMPLATE_REGISTRY_HOST/security-products/container-scanning:7
  dependencies:
  - "Fetch version"
  - "Build OpenK9-Chatbot"
  script:
  - source version.env
  - echo "=== Scanning image $CI_REGISTRY_NAME/openk9/openk9-chatbot:$VERSION ==="
  - gtcs scan --image "$CI_REGISTRY_NAME/openk9/openk9-chatbot:$VERSION"
  rules:
    # Run only on Main
    - !reference [.rules:child-deploy-main-tag, rules]

####################### PUBLISH OPENK9-CHATBOT #######################
Publish OpenK9-Chatbot:
  stage: publish
  image: node:22.14.0
  needs:
  - job: Build OpenK9-Chatbot
  script:
  - cd js-packages/openk9-chatbot
  - pwd
  - whoami
  - export NODE_OPTIONS="--max-old-space-size=8192"
  - yarn config set network-timeout 600000
  - yarn config set cache-folder ../../.yarn-cache
  - yarn install --prefer-offline --frozen-lockfile
  - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
  - npm publish --access public
  rules:
    # Run only on Main
    - !reference [.rules:child-publish, rules]

####################### DEPENDENCY CHECK #######################
Dependency Check OpenK9-Chatbot:
  stage: dependency-check
  needs:
  - job: Publish OpenK9-Chatbot
  extends: .dependency_check_frontend_template
  allow_failure: true
  script:
  - cd js-packages/openk9-chatbot
  - /analyzer run
  rules:
  - !reference [.rules:child-publish, rules]