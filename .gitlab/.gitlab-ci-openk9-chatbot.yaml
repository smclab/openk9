###################### OPENK9-CHATBOT CHILD PIPELINE — RELEASE BRANCH ######################
# The npm library is published only from main. On 3.0.x we only verify it compiles
# on porting-* push and MR — no publish, no release build, no tag handling.
include:
  - local: "/.gitlab/.gitlab-templates.yaml"
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- build
- build-verifier

#################
# Fetch Version #
#################
Fetch version:
  stage: build
  image: node:22.14.0-alpine
  script:
  - cd js-packages/openk9-chatbot
  - export VERSION=$(node -p "require('./package.json').version")
  - echo "VERSION=$VERSION" > $CI_PROJECT_DIR/version.env
  artifacts:
    paths:
    - version.env
    expire_in: 1 day
  rules:
    - !reference [.rules:child-verify-release-mr, rules]
    - !reference [.rules:child-verify-porting-push, rules]

######################## BUILD VERIFIER (yarn install + build) ########################
Build Verifier OpenK9-Chatbot:
  stage: build-verifier
  image: node:22.14.0
  cache:
    key:
      prefix: "openk9-chatbot"
      files:
        - yarn.lock
    paths:
    - js-packages/openk9-chatbot/node_modules
    - .yarn-cache
    policy: pull-push
  needs:
  - job: Fetch version
    artifacts: true
  artifacts:
    paths:
    - js-packages/openk9-chatbot/dist/
    expire_in: 1 day
  script:
  - cd js-packages/openk9-chatbot
  - export NODE_OPTIONS="--max-old-space-size=8192"
  - yarn config set registry https://registry.npmjs.org/
  - yarn config set network-timeout 600000
  - yarn config set cache-folder ../../.yarn-cache
  - yarn install --prefer-offline --frozen-lockfile
  - yarn build
  rules:
    - !reference [.rules:child-verify-release-mr, rules]
    - !reference [.rules:child-verify-porting-push, rules]
