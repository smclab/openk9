###################### OPENK9-CHATBOT PIPELINE ######################
include:
  - local: "/.gitlab/.gitlab-templates.yaml"
  # NEW: Include standardized child rules
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- build
- build-verifier
- dependency-check
- publish

#################
# Fetch Version #
#################
Fetch version:
  stage: build
  image: node:22.14.0-alpine
  script:
  - cd js-packages/openk9-chatbot
  - export VERSION=$(node -p "require('./package.json').version")
  - echo "VERSION=$VERSION" > $CI_PROJECT_DIR/version.env
  artifacts:
    paths:
    - version.env
    expire_in: 1 day
  rules:
    # Always run if triggered
    - !reference [.rules:child-build-always, rules]

######################## BUILD VERIFIER ########################
Build Verifier:
  stage: build-verifier
  image: node:22.14.0
  cache:
    key:
      prefix: "openk9-chatbot"
      files:
        - yarn.lock
    paths:
    - js-packages/openk9-chatbot/node_modules
    - .yarn-cache
    policy: pull-push
  needs:
  - job: Fetch version
    artifacts: true
  artifacts:
    paths:
    - js-packages/openk9-chatbot/dist/
    expire_in: 1 day
  script:
  - cd js-packages/openk9-chatbot
  # Set Node memory limit to 8GB to prevent OOM
  - export NODE_OPTIONS="--max-old-space-size=8192"
  # Yarn configuration for resilience (standalone module)
  - yarn config set registry https://registry.npmjs.org/
  - yarn config set network-timeout 600000
  - yarn config set cache-folder ../../.yarn-cache
  - yarn install --prefer-offline --frozen-lockfile
  - yarn build
  rules:
    # Run only on MR
    - !reference [.rules:child-verify-mr, rules]

####################### PUBLISH OPENK9-CHATBOT #######################
Publish OpenK9-Chatbot:
  stage: publish
  image: node:22.14.0
  cache:
    key:
      prefix: "openk9-chatbot"
      files:
        - yarn.lock
    paths:
    - js-packages/openk9-chatbot/node_modules
    - .yarn-cache
    policy: pull-push
  needs:
  - job: Fetch version
    artifacts: true
  script:
  - cd js-packages/openk9-chatbot
  - export NODE_OPTIONS="--max-old-space-size=8192"
  - yarn config set registry https://registry.npmjs.org/
  - yarn config set network-timeout 600000
  - yarn config set cache-folder ../../.yarn-cache
  - yarn install --prefer-offline --frozen-lockfile
  - yarn build
  - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
  - npm publish --access public
  rules:
    # Run only on Main. NON usare .rules:child-publish qui: e' condivisa e
    # include i tag, per cui su un tag vN.N.N collide col job Release qui sotto
    # (doppio npm publish). Il tag e' gestito solo da "Publish OpenK9-Chatbot Release".
    - if: '$CI_COMMIT_BRANCH == "main"'

# --- RELEASE BRANCH JOBS ---

Build Verifier OpenK9-Chatbot Release MR:
  stage: build-verifier
  image: node:22.14.0
  cache:
    key:
      prefix: "openk9-chatbot"
      files:
        - yarn.lock
    paths:
    - js-packages/openk9-chatbot/node_modules
    - .yarn-cache
    policy: pull-push
  needs:
  - job: Fetch version
    artifacts: true
  script:
  - cd js-packages/openk9-chatbot
  - export NODE_OPTIONS="--max-old-space-size=8192"
  - yarn config set registry https://registry.npmjs.org/
  - yarn config set network-timeout 600000
  - yarn config set cache-folder ../../.yarn-cache
  - yarn install --prefer-offline --frozen-lockfile
  - yarn build
  rules:
    - !reference [.rules:child-verify-release-mr, rules]

# Publish only on release tag (N.N.N), never on release branch SNAPSHOT.
# Library packages should not have -SNAPSHOT versions on the npm registry.
Publish OpenK9-Chatbot Release:
  stage: publish
  image: node:22.14.0
  cache:
    key:
      prefix: "openk9-chatbot"
      files:
        - yarn.lock
    paths:
    - js-packages/openk9-chatbot/node_modules
    - .yarn-cache
    policy: pull-push
  needs:
  - job: Fetch version
    artifacts: true
  script:
  - cd js-packages/openk9-chatbot
  - export NODE_OPTIONS="--max-old-space-size=8192"
  - yarn config set registry https://registry.npmjs.org/
  - yarn config set network-timeout 600000
  - yarn config set cache-folder ../../.yarn-cache
  - yarn install --prefer-offline --frozen-lockfile
  - yarn build
  - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
  - npm publish --access public
  rules:
    # Tag v-prefissato (vN.N.N). Il vecchio regex /^\d+\.\d+\.\d+/ NON matcha
    # "v2026.1.0" (prefisso v) -> su tag questo job non partiva e pubblicava
    # invece il job di main con versione errata. Allineato a child-deploy-release.
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'

####################### DEPENDENCY CHECK #######################
Dependency Check OpenK9-Chatbot:
  stage: dependency-check
  needs:
  - job: Fetch version
  - job: Build Verifier
    optional: true
  extends: .dependency_check_frontend_template
  allow_failure: true
  variables:
    DS_PROJECT_DIR: "js-packages/openk9-chatbot"
  script:
  - yarn config set registry https://registry.npmjs.org/
  - yarn config set network-timeout 600000
  - /analyzer run
  # No explicit rules: inherits .dependency_check_frontend_template rules (MR + main/tag)