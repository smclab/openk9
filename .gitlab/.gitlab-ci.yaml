#############################################
#       GITLAB CI PIPELINE — RELEASE         #
#       Branch: 3.0.x  (release line)        #
#############################################

stages:
  - trigger
  - fetch
  - build
  - build-verifier
  - container-scanning
  - dependency-check
  - restart
  - push

include:
  - local: '/.gitlab/.gitlab-templates.yaml'

  # Domain-specific trigger files (parents only — children are pulled in via `include`
  # inside each trigger job).
  - local: '/.gitlab/ci/backend.yaml'
  - local: '/.gitlab/ci/frontend.yaml'
  - local: '/.gitlab/ci/ai.yaml'
  - local: '/.gitlab/ci/common.yaml'

  # Global quality & security checks (Maven/Python/Frontend dependency audits).
  - local: '/.gitlab/ci/quality.yaml'
