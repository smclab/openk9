#############################################
#            GITLAB CI PIPELINE             #
#        Refactored / Modularized           #
#############################################

# Variabili globali propagate a tutti i child pipeline.
# Modifica `RELEASE_TARGET_ENV` per cambiare il namespace di deploy
# della release line in un solo punto.
variables:
  RELEASE_TARGET_ENV: "k9-stable-2"

stages:
  - trigger
  - build
  - restart
  - quality
  - container-scanning
  - dependency-check
  - build-verifier
  - publish
  - push



include:
  - local: '/.gitlab/.gitlab-templates.yaml'
  
  # 2. Domain-Specific Trigger Files
  - local: '/.gitlab/ci/backend.yaml'
  - local: '/.gitlab/ci/frontend.yaml'
  - local: '/.gitlab/ci/ai.yaml'
  - local: '/.gitlab/ci/enrichers.yaml'
  - local: '/.gitlab/ci/common.yaml'
  
  # 3. Global Quality & Security Checks
  - local: '/.gitlab/ci/quality.yaml'
