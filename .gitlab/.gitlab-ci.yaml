#############################################
#            GITLAB CI PIPELINE             #
#        Refactored / Modularized           #
#############################################

stages:
  - trigger
  - build
  - restart
  - quality
  - container-scanning
  - dependency-check
  - build-verifier
  - publish
  - push

# Global cache configuration
cache:
  key: "${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}"
  paths:
    - .m2/repository
  policy: pull-push

variables:
  # Image used for container scanning
  CS_ANALYZER_IMAGE: "$CI_TEMPLATE_REGISTRY_HOST/security-products/container-scanning:7"

include:
  - local: '/.gitlab/.gitlab-templates.yaml'
  
  # 2. Domain-Specific Trigger Files
  - local: '/.gitlab/ci/backend.yaml'
  - local: '/.gitlab/ci/frontend.yaml'
  - local: '/.gitlab/ci/ai.yaml'
  - local: '/.gitlab/ci/common.yaml'
  
  # 3. Global Quality & Security Checks
  - local: '/.gitlab/ci/quality.yaml'
