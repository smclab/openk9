###################### SEARCH FRONTEND PIPELINE ######################
include:
  - local: "/.gitlab/.gitlab-templates.yaml"
  # NEW: Include standardized child rules
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- build
- build-verifier
- container-scanning
- dependency-check
- restart
- push
- publish

#################
# Fetch Version #
#################
Fetch version:
  stage: build
  image: node:22.14.0-alpine
  script:
  - cd js-packages/search-frontend
  - export VERSION=$(node -p "require('./package.json').version") # Reads version from package.json
  - echo "VERSION=$VERSION" > $CI_PROJECT_DIR/version.env # Saves version to a file
  artifacts:
    paths:
    - version.env
    expire_in: 1 day
  rules:
    # Always run if triggered
    - !reference [.rules:child-build-always, rules]

######################## BUILD SEARCH FRONTEND ########################
Build Search Frontend:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [ "" ]
  variables:
    DOCKER_CONFIG: "/kaniko/.docker"
  needs:
  - job: Fetch version
    artifacts: true
  script:
  - export NODE_OPTIONS="--max-old-space-size=8192"
  - mkdir -p /kaniko/.docker
  - |
    REGISTRY_AUTH=$(printf "%s:%s" "${CI_REGISTRY_USERNAME}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')
    DOCKERHUB_AUTH=$(printf "%s:%s" "${DOCKER_HUB_USER}" "${DOCKER_HUB_PASSWORD}" | base64 | tr -d '\n')
    printf '{"auths":{"registry.smc.it:49083":{"auth":"%s"},"https://index.docker.io/v1/":{"auth":"%s"}}}' \
      "${REGISTRY_AUTH}" "${DOCKERHUB_AUTH}" > /kaniko/.docker/config.json

  # Conditional logic to determine push behaviour
  - |
    if [[ "$CI_COMMIT_BRANCH" == "main" || -n "$CI_COMMIT_TAG" ]]; then
      source $CI_PROJECT_DIR/version.env
      KANIKO_PUSH="--destination $CI_REGISTRY_NAME/openk9/openk9-search-frontend:$VERSION"
      echo "=== Building Search Frontend with VERSION=$VERSION ==="
    elif [[ "$CI_COMMIT_BRANCH" =~ ^[0-9]+-.*$ ]]; then
      if [[ "$GITLAB_USER_LOGIN" == "lorenzo.venneri" || "$GITLAB_USER_LOGIN" == "giorgio.bartolomeo" ]]; then
        KANIKO_PUSH="--destination $CI_REGISTRY_NAME/openk9/openk9-search-frontend:996-SNAPSHOT"
        echo "=== Building Search Frontend with VERSION=996-SNAPSHOT for frontend developer ==="
      else
        KANIKO_PUSH="--no-push"
        echo "=== Building Search Frontend (no push) for generic user ==="
      fi
    fi

  # Run build with the determined push behaviour
  - |
    /kaniko/executor \
      --cache=true \
      --cache-repo=kaniko-cache-registry.openk9.io/kaniko-cache \
      --cache-ttl=72h \
      --snapshot-mode=redo \
      --compressed-caching=false \
      --context "${CI_PROJECT_DIR}" \
      --dockerfile "${CI_PROJECT_DIR}/js-packages/search-frontend/Dockerfile" \
      $KANIKO_PUSH \
      --build-arg NODE_OPTIONS="--max-old-space-size=8192"
  rules:
    # main/tag: push versione; designated feature: push 996-SNAPSHOT; generic feature: build no push
    - !reference [.rules:child-deploy-main-tag, rules]
    - !reference [.rules:child-restart-feature, rules]
    - !reference [.rules:child-build-feature-generic, rules]

######################## BUILD VERIFIER (NODE) ########################
Build Verifier:
  stage: build-verifier
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [ "" ]
  variables:
    DOCKER_CONFIG: "/kaniko/.docker"
  needs:
  - job: Fetch version
    artifacts: false
  script:
  - mkdir -p /kaniko/.docker
  - printf '{}' > /kaniko/.docker/config.json
  - |
    /kaniko/executor \
      --cache=true \
      --cache-repo=kaniko-cache-registry.openk9.io/kaniko-cache \
      --cache-ttl=72h \
      --snapshot-mode=time \
      --compressed-caching=false \
      --context "${CI_PROJECT_DIR}" \
      --dockerfile "${CI_PROJECT_DIR}/js-packages/search-frontend/Dockerfile" \
      --no-push \
      --build-arg NODE_OPTIONS="--max-old-space-size=8192"
  rules:
    # Run only on MR — Kaniko --no-push avoids yarn install on runner disk (prevents ENOSPC)
    - !reference [.rules:child-verify-mr, rules]

######################## CONTAINER SCANNING ########################
Container Scanning:
  stage: container-scanning
  image: $CS_ANALYZER_IMAGE
  allow_failure: true
  dependencies:
  - "Fetch version"
  - "Build Search Frontend"
  script:
  - source version.env # Loads version from artifact
  - echo "Scanning image $CI_REGISTRY_NAME/openk9/openk9-search-frontend:$VERSION"
  - gtcs scan --image "$CI_REGISTRY_NAME/openk9/openk9-search-frontend:$VERSION" # Scans the image
  rules:
    # Run only on Main
    - !reference [.rules:child-deploy-main-tag, rules]

######################## TRIGGER RESTART ########################
Trigger Restart:
  extends: .restart_job_template
  dependencies:
  - Fetch version
  variables:
    COMPONENT_NAME: "search-frontend"
    COMPONENT_TYPE: "frontend"
  rules:
    # Run on Main/Tag and Feature
    - !reference [.rules:child-deploy-main-tag, rules]
    - !reference [.rules:child-restart-feature, rules]

####################### PUBLISH SEARCH FRONTEND #######################
Publish Search Frontend:
  stage: publish
  image: node:22.14.0
  needs:
  - job: Fetch version
    artifacts: true
  script:
  - cd js-packages/search-frontend
  - export NODE_OPTIONS="--max-old-space-size=8192"
  - yarn config set registry https://registry.npmjs.org/
  - yarn config set network-timeout 600000
  - yarn config set cache-folder ../../.yarn-cache
  - yarn install --prefer-offline --frozen-lockfile
  - yarn build
  - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
  - npm publish --access public
  rules:
    # Publish only on Main/Tag
    - !reference [.rules:child-publish, rules]
    # Note: Manual rule removed to standard automation, or re-add if strict manual is required.
    # Original file had partial Manual. Moving to automated publish if pipeline succeeds on Main.

# --- RELEASE BRANCH JOBS ---

Build Search Frontend Release:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [ "" ]
  variables:
    DOCKER_CONFIG: "/kaniko/.docker"
  needs:
  - job: Fetch version
    artifacts: true
  script:
  - export NODE_OPTIONS="--max-old-space-size=8192"
  - mkdir -p /kaniko/.docker
  - |
    REGISTRY_AUTH=$(printf "%s:%s" "${CI_REGISTRY_USERNAME}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')
    DOCKERHUB_AUTH=$(printf "%s:%s" "${DOCKER_HUB_USER}" "${DOCKER_HUB_PASSWORD}" | base64 | tr -d '\n')
    printf '{"auths":{"registry.smc.it:49083":{"auth":"%s"},"https://index.docker.io/v1/":{"auth":"%s"}}}' \
      "${REGISTRY_AUTH}" "${DOCKERHUB_AUTH}" > /kaniko/.docker/config.json
  - |
    if [[ -n "$CI_COMMIT_TAG" && "$CI_COMMIT_TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
      source $CI_PROJECT_DIR/version.env
      KANIKO_PUSH="--destination $CI_REGISTRY_NAME/openk9/openk9-search-frontend:$VERSION"
      echo "=== Release tag: push $VERSION ==="
    elif [[ "$CI_COMMIT_BRANCH" =~ ^[0-9]+\.[0-9]+\.x$ ]]; then
      source $CI_PROJECT_DIR/version.env
      SNAP_TAG="${VERSION}-SNAPSHOT"
      KANIKO_PUSH="--destination $CI_REGISTRY_NAME/openk9/openk9-search-frontend:$SNAP_TAG"
      echo "=== Release branch: push $SNAP_TAG ==="
    else
      KANIKO_PUSH="--no-push"
      echo "=== Release MR: build only, no push ==="
    fi
  - |
    /kaniko/executor \
      --cache=true \
      --cache-repo=kaniko-cache-registry.openk9.io/kaniko-cache \
      --cache-ttl=72h \
      --snapshot-mode=redo \
      --compressed-caching=false \
      --context "${CI_PROJECT_DIR}" \
      --dockerfile "${CI_PROJECT_DIR}/js-packages/search-frontend/Dockerfile" \
      $KANIKO_PUSH \
      --build-arg NODE_OPTIONS="--max-old-space-size=8192"
  rules:
    - !reference [.rules:child-deploy-release, rules]

Build Verifier Search Frontend Release MR:
  stage: build-verifier
  image: node:22.14.0
  cache:
    - key:
        prefix: "shared-yarn"
        files:
          - yarn.lock
      paths:
        - .yarn-cache
      policy: pull
    - key:
        prefix: "search-frontend-nm"
        files:
          - js-packages/search-frontend/package.json
      paths:
        - js-packages/search-frontend/node_modules
      policy: pull
  script:
  - export NODE_OPTIONS="--max-old-space-size=8192"
  - yarn config set registry https://registry.npmjs.org/
  - yarn config set network-timeout 600000
  - yarn config set cache-folder .yarn-cache
  - yarn install --prefer-offline --frozen-lockfile
  - CI=false npx lerna run build --scope @openk9ui/search-frontend
  rules:
    - !reference [.rules:child-verify-release-mr, rules]

Trigger Restart Search Frontend Release:
  extends: .restart_job_template
  dependencies:
  - Fetch version
  variables:
    COMPONENT_NAME: "search-frontend"
    COMPONENT_TYPE: "frontend"
    TARGET_ENV: "$RELEASE_TARGET_ENV"
  rules:
    - !reference [.rules:child-deploy-release, rules]

####################### DEPENDENCY CHECK #######################
Dependency Check Search Frontend:
  stage: dependency-check
  needs:
  - job: Fetch version
  - job: Build Verifier
    optional: true
  extends: .dependency_check_frontend_template
  allow_failure: true
  variables:
    # Point the npm-audit analyzer to the specific subdirectory.
    # Without this, it finds the root yarn.lock and installs the entire
    # workspace → segfault in yarn 1.22.5 inside the analyzer container.
    DS_PROJECT_DIR: "js-packages/search-frontend"
  script:
  - yarn config set registry https://registry.npmjs.org/
  - yarn config set network-timeout 600000
  - /analyzer run

######################## COPY TO DOCKER HUB ########################
# Runs only on Git tag. Copies the already-built image to Docker Hub without rebuilding.
# See .skopeo-copy-to-dockerhub in .gitlab-templates.yaml for full details.
Copy Search Frontend to DockerHub:
  extends: .skopeo-copy-to-dockerhub
  variables:
    REGISTRY_COMPONENT_NAME: "openk9-search-frontend"
  needs:
    - job: Fetch version
      artifacts: true  # downloads version.env — needed to resolve the image version
    - job: Build Search Frontend
      artifacts: false  # image is on the registry, no artifacts needed from this job
