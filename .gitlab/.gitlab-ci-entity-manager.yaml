###################### ENTITY MANAGER CHILD PIPELINE ######################
include:
  - local: '/.gitlab/.gitlab-templates.yaml'
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- build
- build-verifier
- container-scanning
- restart

Build Entity-Manager Image:
  extends: .build_template
  variables:
    COMPONENT: "entity-manager"
  stage: build
  script:
  - cd core
  - !reference [.maven-build-logic, script]
  artifacts:
    paths:
    - .version
    expire_in: 24 hours
  rules:
    # main/tag: push versione; designated feature: push snapshot; generic feature: build no push
    - !reference [.rules:child-deploy-main-tag, rules]
    - !reference [.rules:child-restart-feature, rules]
    - !reference [.rules:child-build-feature-generic, rules]

######################## BUILD VERIFIER ########################
Build Verifier Entity-Manager:
  extends: .maven-verifier-template
  stage: build-verifier
  variables:
    COMPONENT: "entity-manager"
  rules:
    # Run only on MR - lightweight compile check, no push
    - !reference [.rules:child-verify-mr, rules]

# SCANNING JOB
Container Scanning Entity-Manager:
  dependencies: [ Build Entity-Manager Image ]
  extends: .container-scanning-template
  variables:
    REGISTRY_COMPONENT_NAME: "openk9-entity-manager"
  rules:
    - !reference [.rules:child-deploy-main-tag, rules]

# RESTART JOB
Trigger Restart Entity-Manager:
  extends: .restart_job_template
  dependencies:
  - Build Entity-Manager Image
  variables:
    COMPONENT_NAME: "entity-manager"
    COMPONENT_TYPE: "backend"
  rules:
    - !reference [.rules:child-deploy-main-tag, rules]
    - !reference [.rules:child-restart-feature, rules]

# --- RELEASE BRANCH JOBS ---

Build Entity-Manager Release:
  extends: .build_template
  variables:
    COMPONENT: "entity-manager"
  stage: build
  script:
  - cd core
  - !reference [.maven-build-logic-release, script]
  artifacts:
    paths:
    - .version
    expire_in: 24 hours
  rules:
    - !reference [.rules:child-deploy-release, rules]

Build Verifier Entity-Manager Release MR:
  extends: .maven-verifier-template
  stage: build-verifier
  variables:
    COMPONENT: "entity-manager"
  script:
  - !reference [.maven-build-verifier-logic, script]
  rules:
    - !reference [.rules:child-verify-release-mr, rules]

Trigger Restart Entity-Manager Release:
  extends: .restart_job_template
  dependencies:
  - Build Entity-Manager Release
  variables:
    COMPONENT_NAME: "entity-manager"
    COMPONENT_TYPE: "backend"
    TARGET_ENV: "k9-stable-2"
  rules:
    - !reference [.rules:child-deploy-release, rules]
