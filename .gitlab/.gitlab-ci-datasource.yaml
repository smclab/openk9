###################### DATASOURCE CHILD PIPELINE — RELEASE BRANCH ######################
include:
  - local: '/.gitlab/.gitlab-templates.yaml'
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- build
- build-verifier
- container-scanning
- restart
- push

# Build + push image to internal registry.
# Fires on push 3.0.x (SNAPSHOT) and on tag 3.0.N (release version).
Build Datasource Release:
  extends: .build_template
  variables:
    COMPONENT: "datasource"
  stage: build
  script:
  - cd core
  - !reference [.maven-build-logic-release, script]
  artifacts:
    paths:
    - .version
    expire_in: 24 hours
  rules:
    - !reference [.rules:child-build-release, rules]

# Compile check on MR porting-* → 3.0.x and on push porting-* (no push).
Build Verifier Datasource:
  extends: .maven-verifier-template
  stage: build-verifier
  variables:
    COMPONENT: "datasource"
  script:
  - !reference [.maven-build-verifier-logic, script]
  rules:
    - !reference [.rules:child-verify-release-mr, rules]
    - !reference [.rules:child-verify-porting-push, rules]

# Container scan on the image just built — fires on push 3.0.x ONLY.
Container Scanning Datasource:
  extends: .container-scanning-template
  needs:
  - job: Build Datasource Release
    artifacts: true
  variables:
    REGISTRY_COMPONENT_NAME: "openk9-datasource"
  rules:
    - !reference [.rules:child-restart-release, rules]

# Restart k9-stable-2 — fires on push 3.0.x ONLY (tags do not auto-restart).
Trigger Restart Datasource Release:
  extends: .restart_job_template
  dependencies:
  - Build Datasource Release
  variables:
    COMPONENT_NAME: "datasource"
    COMPONENT_TYPE: "backend"
    TARGET_ENV: "k9-stable-2"
  rules:
    - !reference [.rules:child-restart-release, rules]

# Copy image to Docker Hub — fires on tag 3.0.N ONLY.
Copy Datasource to DockerHub:
  extends: .skopeo-copy-to-dockerhub
  variables:
    REGISTRY_COMPONENT_NAME: "openk9-datasource"
  needs:
    - job: Build Datasource Release
      artifacts: true  # downloads .version file — needed to resolve the image tag
  rules:
    - !reference [.rules:child-skopeo-release, rules]
