###################### DATASOURCE CHILD PIPELINE ######################
include:
  - local: '/.gitlab/.gitlab-templates.yaml'
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- build
- build-verifier
- container-scanning
- restart
- push

Build Datasource image:
  extends: .build_template
  variables:
    COMPONENT: "datasource"
  stage: build
  script:
  - cd core
  - !reference [.maven-build-logic, script]
  artifacts:
    paths:
    - .version
    expire_in: 24 hours
  rules:
    # main/tag: push versione; designated feature: push snapshot; generic feature: build no push
    - !reference [.rules:child-deploy-main-tag, rules]
    - !reference [.rules:child-restart-feature, rules]
    - !reference [.rules:child-build-feature-generic, rules]

######################## BUILD VERIFIER ########################
Build Verifier Datasource:
  extends: .maven-verifier-template
  stage: build-verifier
  variables:
    COMPONENT: "datasource"
  script:
  - !reference [.maven-build-verifier-logic, script]
  rules:
    # Run only on MR - lightweight compile check, no push
    - !reference [.rules:child-verify-mr, rules]

# SCANNING JOB
Container Scanning Datasource:
  dependencies: [ Build Datasource image ]
  extends: .container-scanning-template
  variables:
    REGISTRY_COMPONENT_NAME: "openk9-datasource"
  rules:
    - !reference [.rules:child-deploy-main-tag, rules]

# RESTART JOB
Trigger Restart Datasource:
  extends: .restart_job_template
  dependencies:
  - Build Datasource image
  variables:
    COMPONENT_NAME: "datasource"
    COMPONENT_TYPE: "backend"
  rules:
    - !reference [.rules:child-deploy-main-tag, rules]
    - !reference [.rules:child-restart-feature, rules]

# --- RELEASE BRANCH JOBS ---

Build Datasource Release:
  extends: .build_template
  variables:
    COMPONENT: "datasource"
  stage: build
  script:
  - cd core
  - !reference [.maven-build-logic-release, script]
  artifacts:
    paths:
    - .version
    expire_in: 24 hours
  rules:
    - !reference [.rules:child-deploy-release, rules]

Build Verifier Datasource Release MR:
  extends: .maven-verifier-template
  stage: build-verifier
  variables:
    COMPONENT: "datasource"
  script:
  - !reference [.maven-build-verifier-logic, script]
  rules:
    - !reference [.rules:child-verify-release-mr, rules]

Trigger Restart Datasource Release:
  extends: .restart_job_template
  dependencies:
  - Build Datasource Release
  variables:
    COMPONENT_NAME: "datasource"
    COMPONENT_TYPE: "backend"
    TARGET_ENV: "$RELEASE_TARGET_ENV"
  rules:
    - !reference [.rules:child-deploy-release, rules]

######################## COPY TO DOCKER HUB ########################
# Runs only on Git tag. Copies the image already pushed to the internal registry
# to Docker Hub (smclab/openk9-datasource:<version>) without rebuilding.
# See .skopeo-copy-to-dockerhub in .gitlab-templates.yaml for full details.
Copy Datasource to DockerHub:
  extends: .skopeo-copy-to-dockerhub
  variables:
    REGISTRY_COMPONENT_NAME: "openk9-datasource"
  needs:
    - job: Build Datasource image
      artifacts: true  # downloads .version file — needed to resolve the image tag
