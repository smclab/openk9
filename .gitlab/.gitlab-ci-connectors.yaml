###############################################################
#               CONTAINER SCANNING WEB CONNECTOR              #
###############################################################
Container Scanning Web Connector:
  stage: container-scanning
  image: $CS_ANALYZER_IMAGE
  allow_failure: true
  needs:
  - "Build Web Connector image"
  before_script:
  - export VERSION=${CI_COMMIT_TAG:-latest}
  script:
  - echo "=== Scanning image $CI_REGISTRY_NAME/openk9/openk9-web-connector:$VERSION ==="
  - gtcs scan --image "$CI_REGISTRY_NAME/openk9/openk9-web-connector:$VERSION"
  rules:
  - if: '$CI_COMMIT_BRANCH == "main"'
    changes:
    - connectors/openk9-crawler/**/*
  - if: '$CI_COMMIT_TAG'

