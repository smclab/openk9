###############################################################
#               CONTAINER SCANNING WEB CONNECTOR              #
###############################################################
Container Scanning Web Connector:
  stage: container-scanning
  image: $CS_ANALYZER_IMAGE
  allow_failure: true
  needs:
  - "Build Web Connector image"
  before_script:
  # Strip the leading 'v': the image was pushed as :2026.1.0, not :v2026.1.0
  - export VERSION=${CI_COMMIT_TAG#v}
  script:
  - echo "=== Scanning image $CI_REGISTRY_NAME/openk9/openk9-web-connector:$VERSION ==="
  - gtcs scan --image "$CI_REGISTRY_NAME/openk9/openk9-web-connector:$VERSION"
  # Allineato al build: scatta solo sulle modifiche al codice del connector
  rules:
  - if: '$CI_COMMIT_BRANCH == "main"'
    changes:
    - connectors/openk9-crawler/connector/**/*
  - if: '$CI_COMMIT_TAG'

