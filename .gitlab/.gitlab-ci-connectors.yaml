######################### CONNECTORS CHILD PIPELINE — RELEASE BRANCH #########################
include:
  - local: '/.gitlab/.gitlab-templates.yaml'
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- fetch
- build
- build-verifier
- push

variables:
  KANIKO_IMAGE: "gcr.io/kaniko-project/executor:v1.23.2-debug"

#################
# Fetch Config  #
#################
# OPENK9_VERSION is read from python_modules_config.txt (e.g. 3.0.3-SNAPSHOT) —
# the same source used by AI modules. On tag pipelines we use $CI_COMMIT_TAG
# instead, so this is only consumed on branch builds.
Fetch config:
  stage: fetch
  image: alpine:3.19
  script:
  - VERSION=$(grep '^OPENK9_VERSION=' python_modules_config.txt | cut -d '=' -f2)
  - echo "VERSION=$VERSION"
  - echo "VERSION=$VERSION" > "$CI_PROJECT_DIR/config.env"
  artifacts:
    paths:
    - config.env
    expire_in: 1 day
  rules:
  - !reference [.rules:child-build-always, rules]

# ──────────────────────────────────────────────────────────────────────────────
# Hidden anchors — shared body for all connectors
# ──────────────────────────────────────────────────────────────────────────────
.connector-build-release: &connector-build-release
  stage: build
  image:
    name: $KANIKO_IMAGE
    entrypoint: [ "" ]
  needs:
  - job: Fetch config
    artifacts: true
  script:
  - |
    source $CI_PROJECT_DIR/config.env
    mkdir -p /kaniko/.docker
    echo "{\"auths\":{\"registry.smc.it:49083\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USERNAME}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"},\"https://index.docker.io/v1/\":{\"auth\":\"$(printf "%s:%s" "${DOCKER_HUB_USER}" "${DOCKER_HUB_PASSWORD}" | base64 | tr -d '\n')\"}}}" \
    > /kaniko/.docker/config.json
    KANIKO_FLAGS="--cache=true --cache-repo=kaniko-cache-registry.openk9.io/kaniko-cache --cache-ttl=72h --snapshot-mode=redo --compressed-caching=false"
    KANIKO_CTX="--context ${CI_PROJECT_DIR}/connectors/${CONNECTOR_DIR}/connector --dockerfile ${CI_PROJECT_DIR}/connectors/${CONNECTOR_DIR}/connector/Dockerfile"
    if [ -n "$CI_COMMIT_TAG" ]; then
      IMAGE_TAG="$CI_COMMIT_TAG"
    else
      IMAGE_TAG="$VERSION"
    fi
    echo "[$IMAGE_NAME] push :$IMAGE_TAG"
    /kaniko/executor $KANIKO_FLAGS $KANIKO_CTX \
      --destination "$CI_REGISTRY_NAME/openk9/$IMAGE_NAME:$IMAGE_TAG"

.connector-verify: &connector-verify
  stage: build-verifier
  image:
    name: $KANIKO_IMAGE
    entrypoint: [ "" ]
  needs:
  - job: Fetch config
    artifacts: true
  script:
  - |
    mkdir -p /kaniko/.docker
    echo "{\"auths\":{\"registry.smc.it:49083\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USERNAME}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" \
    > /kaniko/.docker/config.json
    KANIKO_FLAGS="--cache=true --cache-repo=kaniko-cache-registry.openk9.io/kaniko-cache --cache-ttl=72h --snapshot-mode=redo --compressed-caching=false"
    KANIKO_CTX="--context ${CI_PROJECT_DIR}/connectors/${CONNECTOR_DIR}/connector --dockerfile ${CI_PROJECT_DIR}/connectors/${CONNECTOR_DIR}/connector/Dockerfile"
    /kaniko/executor $KANIKO_FLAGS $KANIKO_CTX --no-push

###############################################################
#                       WEB CONNECTOR                         #
###############################################################
Build Web Connector Release:
  <<: *connector-build-release
  variables:
    CONNECTOR_DIR: "openk9-crawler"
    IMAGE_NAME: "openk9-web-connector"
  rules:
  - !reference [.rules:child-build-release, rules]

Build Verifier Web Connector:
  <<: *connector-verify
  variables:
    CONNECTOR_DIR: "openk9-crawler"
  rules:
  - !reference [.rules:child-verify-release-mr, rules]
  - !reference [.rules:child-verify-porting-push, rules]

Copy Web Connector to DockerHub:
  extends: .skopeo-copy-to-dockerhub
  variables:
    REGISTRY_COMPONENT_NAME: "openk9-web-connector"
  needs:
  - job: Fetch config
    artifacts: true
  - job: Build Web Connector Release
    artifacts: false
  rules:
  - !reference [.rules:child-skopeo-release, rules]

