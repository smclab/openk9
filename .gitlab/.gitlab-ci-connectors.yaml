# Runs only on Git tag. Copies the already-built image from the internal
# registry to Docker Hub (smclab/*) without rebuilding.
# See .skopeo-copy-to-dockerhub in .gitlab-templates.yaml for full details.

Copy Web Connector to DockerHub:
  extends: .skopeo-copy-to-dockerhub
