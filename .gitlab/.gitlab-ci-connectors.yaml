  rules:
  - if: '$CI_COMMIT_BRANCH == "main"'
    changes:
    - connectors/gitlab-connector/connector/**/*
  - if: '$CI_COMMIT_TAG'

###############################################################
#             CONTAINER SCANNING MINIO CONNECTOR             #
###############################################################
Container Scanning Minio Connector:
  stage: container-scanning
  image: $CS_ANALYZER_IMAGE
  allow_failure: true
  needs:
  - "Build Minio Connector image"
  before_script:
  # Strip the leading 'v': the image was pushed as :2026.1.0, not :v2026.1.0
  - export VERSION=${CI_COMMIT_TAG#v}
  script:
  - echo "=== Scanning image $CI_REGISTRY_NAME/openk9/openk9-minio-connector:$VERSION ==="
  - gtcs scan --image "$CI_REGISTRY_NAME/openk9/openk9-minio-connector:$VERSION"
  # Allineato al build: scatta solo sulle modifiche al codice del connector
  rules:
  - if: '$CI_COMMIT_BRANCH == "main"'
    changes:
    - connectors/minio-connector/connector/**/*
  - if: '$CI_COMMIT_TAG'

