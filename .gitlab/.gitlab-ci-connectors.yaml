######################### CONNECTORS PIPELINE #########################
include:
  - local: '/.gitlab/.gitlab-templates.yaml'
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- fetch
- build
- container-scanning
- push

#################
# Fetch Config  #
#################
Fetch config:
  stage: fetch
  image: alpine:3.19
  script:
  - source python_modules_config.txt
  - echo "VERSION=$OPENK9_VERSION"
  - echo "VERSION=$OPENK9_VERSION" > "$CI_PROJECT_DIR/config.env"
  artifacts:
    paths:
    - config.env
    expire_in: 1 day
  rules:
  - !reference [.rules:child-build-always, rules]

Build Web Connector image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [ "" ]
  variables:
    DOCKER_CONFIG: "/kaniko/.docker"
    COMPONENT: "web-connector"
  needs:
  - job: Fetch config
    artifacts: true
  script:
  - |
    echo "=== Building Web Connector (openk9-crawler) ==="
    source $CI_PROJECT_DIR/config.env

    echo "=== Configuring Kaniko ==="
    mkdir -p /kaniko/.docker
    echo "{\"auths\":{\"registry.smc.it:49083\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USERNAME}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"},\"https://index.docker.io/v1/\":{\"auth\":\"$(printf "%s:%s" "${DOCKER_HUB_USER}" "${DOCKER_HUB_PASSWORD}" | base64 | tr -d '\n')\"}}}" \
    > /kaniko/.docker/config.json

    echo "=== Building Docker image with Kaniko ==="
    KANIKO_FLAGS="--cache=true --cache-repo=kaniko-cache-registry.openk9.io/kaniko-cache --cache-ttl=72h --snapshot-mode=redo --compressed-caching=false"
    KANIKO_CTX="--context ${CI_PROJECT_DIR}/connectors/openk9-crawler/connector --dockerfile ${CI_PROJECT_DIR}/connectors/openk9-crawler/connector/Dockerfile"

    if [ -n "$CI_MERGE_REQUEST_IID" ] || [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ] || \
       { [ "$CI_PIPELINE_SOURCE" = "parent_pipeline" ] && [ -z "$CI_COMMIT_BRANCH" ] && [ -z "$CI_COMMIT_TAG" ]; }; then
      echo "MR: build only, no push"
      /kaniko/executor $KANIKO_FLAGS $KANIKO_CTX --no-push
    elif [ -n "$CI_COMMIT_TAG" ]; then
      # Strip the leading 'v': images are versioned without it (openk9-web-connector:2026.1.0).
      # The 'v' is only the pipeline-trigger convention, never part of the image tag.
      /kaniko/executor $KANIKO_FLAGS $KANIKO_CTX \
        --destination "$CI_REGISTRY_NAME/openk9/openk9-web-connector:${CI_COMMIT_TAG#v}"
    else
      echo "main: push :$VERSION"
      /kaniko/executor $KANIKO_FLAGS $KANIKO_CTX \
        --destination "$CI_REGISTRY_NAME/openk9/openk9-web-connector:$VERSION"
    fi
  # Solo modifiche al codice del connector, non al chart Helm
  rules:
  - if: '$CI_COMMIT_BRANCH == "main"'
    changes:
    - connectors/openk9-crawler/connector/**/*
  - if: '$CI_COMMIT_TAG'
  # Release branch (N.N.x) — same convention as backend/AI/FE: push :<version>-SNAPSHOT
  # to the internal registry (OPENK9_VERSION already carries -SNAPSHOT on the branch).
  - if: '$CI_COMMIT_BRANCH =~ /^\d+\.\d+\.x$/'
    changes:
    - connectors/openk9-crawler/connector/**/*
  # Porting MR toward a release branch — verifier-only build, no push.
  - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^\d+\.\d+\.x$/'
    changes:
    - connectors/openk9-crawler/connector/**/*
  - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    changes:
    - connectors/openk9-crawler/connector/**/*

