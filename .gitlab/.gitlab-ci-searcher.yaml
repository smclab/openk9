###################### SEARCHER CHILD PIPELINE ######################
include:
  - local: '/.gitlab/.gitlab-templates.yaml'
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- build
- container-scanning
- restart

Build Searcher Image:
  extends: .build_template
  variables:
    COMPONENT: "searcher"
  stage: build
  script:
  - cd core
  - !reference [.maven-build-logic, script]
  artifacts:
    paths:
    - .version
    expire_in: 24 hours
  rules:
    - !reference [.rules:child-build-always, rules]

# SCANNING JOB
Container Scanning Searcher:
  dependencies: [ Build Searcher Image ]
  extends: .container-scanning-template
  variables:
    REGISTRY_COMPONENT_NAME: "openk9-searcher"
  rules:
    - !reference [.rules:child-deploy-main-tag, rules]

# RESTART JOB
Trigger Restart Searcher:
  extends: .restart_job_template
  dependencies:
  - Build Searcher Image
  variables:
    COMPONENT_NAME: "searcher"
    COMPONENT_TYPE: "backend"
  rules:
    - !reference [.rules:child-deploy-main-tag, rules]
    - !reference [.rules:child-restart-feature, rules]
