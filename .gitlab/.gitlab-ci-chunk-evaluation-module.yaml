###################### CHUNK EVALUATION MODULE CHILD PIPELINE ######################
include:
  - local: '/.gitlab/.gitlab-templates.yaml'
  # NEW: Include standardized child rules
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- build


#################
# Fetch Config  #
#################
Fetch config:
  stage: build
  image: alpine:3.16
  script:
  - apk add --no-cache grep
  - VERSION=$(grep '^OPENK9_VERSION=' python_modules_config.txt | cut -d '=' -f2)
  # Extract PYTHON_BASE_DOCKER_IMAGE value from config file
  - PYTHON_BASE_DOCKER_IMAGE=$(grep '^PYTHON_BASE_DOCKER_IMAGE=' python_modules_config.txt | cut -d '=' -f2)
  # Write results to .env file
  - echo "VERSION=$VERSION" > "$CI_PROJECT_DIR/config.env"
  - echo "PYTHON_BASE_DOCKER_IMAGE=$PYTHON_BASE_DOCKER_IMAGE" >> "$CI_PROJECT_DIR/config.env"
  artifacts:
    paths:
    - config.env
    expire_in: 1 day
  rules:
    # Always run if triggered
    - !reference [.rules:child-build-always, rules]

######################## BUILD CHUNK EVALUATION IMAGE (KANIKO) ########################
Build Chunk Evaluation Image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [ "" ]
  needs:
  - job: Fetch config
    artifacts: true
  script:
  - source $CI_PROJECT_DIR/config.env
  - echo "=== Configuring Kaniko credentials ==="
  - mkdir -p /kaniko/.docker
  - |
    echo "{\"auths\":{\"registry.smc.it:49083\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USERNAME}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"},\"https://index.docker.io/v1/\":{\"auth\":\"$(printf "%s:%s" "${DOCKER_HUB_USER}" "${DOCKER_HUB_PASSWORD}" | base64 | tr -d '\n')\"}}}" \
    > /kaniko/.docker/config.json
  - |
    if [ "$CI_COMMIT_BRANCH" = "main" ] || [ -n "$CI_COMMIT_TAG" ]; then
      echo "[CHUNK-EVAL] Build & push as :$VERSION"
      # ── Kaniko layer cache (added 2026-02) ────────────────────────────────────────
      # --cache=true         abilita il Docker layer cache
      # --cache-repo         registry:2 su MinIO (k9-requirements, bucket: kaniko-cache)
      #                      evita di riempire il registry SMC con layer temporanei
      # --cache-ttl=168h     layer più vecchi di 7 giorni vengono ignorati
      #                      coerente con il MinIO lifecycle TTL sul bucket
      # --snapshot-mode=redo usa mtime invece di sha256 per rilevare cambiamenti
      #                      riduce "Taking snapshot of full filesystem" da ~900s a ~5s
      # --compressed-caching=false evita l'errore OOM (exit code 137) disabilitando
      #                      la compressione in RAM dei layer giganti (es. PyTorch)
      # ──────────────────────────────────────────────────────────────────────────────
      /kaniko/executor \
        --cache=true \
        --cache-repo=kaniko-cache-registry.openk9.io/kaniko-cache \
        --cache-ttl=168h \
        --snapshot-mode=redo \
        --compressed-caching=false \
        --context "${CI_PROJECT_DIR}/ai-packages/chunk-evaluation-module" \
        --dockerfile "${CI_PROJECT_DIR}/ai-packages/chunk-evaluation-module/Dockerfile" \
        --destination "${CI_REGISTRY_NAME}/openk9/chunk-evaluation-module:$VERSION" \
        --build-arg PYTHON_BASE_DOCKER_IMAGE=$PYTHON_BASE_DOCKER_IMAGE
    elif [ -n "$CI_MERGE_REQUEST_IID" ] || [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then
      echo "[CHUNK-EVAL] Build & push as :merge-request"
      # ── Kaniko layer cache: vedi prima occorrenza per spiegazione flag ──
      /kaniko/executor \
        --cache=true \
        --cache-repo=kaniko-cache-registry.openk9.io/kaniko-cache \
        --cache-ttl=168h \
        --snapshot-mode=redo \
        --compressed-caching=false \
        --context "${CI_PROJECT_DIR}/ai-packages/chunk-evaluation-module" \
        --dockerfile "${CI_PROJECT_DIR}/ai-packages/chunk-evaluation-module/Dockerfile" \
        --destination "${CI_REGISTRY_NAME}/openk9/chunk-evaluation-module:$VERSION" \
        --build-arg PYTHON_BASE_DOCKER_IMAGE=$PYTHON_BASE_DOCKER_IMAGE
    elif echo "$CI_COMMIT_BRANCH" | grep -qE '^[0-9]+-.*$'; then
      echo "[CHUNK-EVAL] Feature branch => build & push :997-SNAPSHOT"
      # ── Kaniko layer cache: vedi prima occorrenza per spiegazione flag ──
      /kaniko/executor \
        --cache=true \
        --cache-repo=kaniko-cache-registry.openk9.io/kaniko-cache \
        --cache-ttl=168h \
        --snapshot-mode=redo \
        --compressed-caching=false \
        --context "${CI_PROJECT_DIR}/ai-packages/chunk-evaluation-module" \
        --dockerfile "${CI_PROJECT_DIR}/ai-packages/chunk-evaluation-module/Dockerfile" \
        --destination "${CI_REGISTRY_NAME}/openk9/chunk-evaluation-module:997-SNAPSHOT" \
        --build-arg PYTHON_BASE_DOCKER_IMAGE=$PYTHON_BASE_DOCKER_IMAGE
    fi
  rules:
    # Always run build if parent triggered us
    - !reference [.rules:child-build-always, rules]
