    - !reference [.rules:child-restart-feature, rules]
    - !reference [.rules:child-build-feature-generic, rules]

######################## BUILD VERIFIER EMBEDDING ########################
Build Verifier:
  stage: build-verifier
  image: python:3.12-slim
  script:
  - echo "=== Python syntax check for embedding-modules ==="
  - find ai-packages/embedding-modules -name "*.py" -not -path "*/__pycache__/*" | xargs python3 -m py_compile
  - echo "=== Syntax check passed ==="
  rules:
    - !reference [.rules:child-verify-mr, rules]

######################## CONTAINER SCANNING EMBEDDING OA #########################
Container Scanning Embedding OA:
  stage: container-scanning
  image: $CS_ANALYZER_IMAGE
  needs:
  - job: Fetch config
    artifacts: true
  - job: Build Embedding OpenAI
    artifacts: false
  variables:
    CS_REGISTRY_USER: "$CI_REGISTRY_USERNAME"
    CS_REGISTRY_PASSWORD: "$CI_REGISTRY_PASSWORD"
    GIT_STRATEGY: fetch
    REGISTRY_COMPONENT_NAME: "openk9-openai-module"
  allow_failure: true
  artifacts:
    reports:
      container_scanning: gl-container-scanning-report.json
      cyclonedx: "**/gl-sbom-*.cdx.json"
    paths:
    - gl-container-scanning-report.json
    - gl-dependency-scanning-report.json
    - "**/gl-sbom-*.cdx.json"
  before_script:
  - source $CI_PROJECT_DIR/config.env
  - export CS_IMAGE="$CI_REGISTRY_NAME/openk9/$REGISTRY_COMPONENT_NAME:$VERSION"
  - echo "Using version $VERSION"
  script:
  - gtcs scan
  rules:
    # Container scanning only on main/tag (not on feature branches)
    - !reference [.rules:child-deploy-main-tag, rules]

######################## TRIGGER RESTART EMBEDDING #########################
Trigger Restart:
  extends: .restart_job_template
  variables:
    COMPONENT_NAME: "embedding-module"
    COMPONENT_TYPE: "ai"
  needs:
  - job: Fetch config
    artifacts: true
  - job: Build Embedding OpenAI
    artifacts: false
  - job: Build Embedding ST
    artifacts: false
  rules:
    # Run only on main/tag or designated feature branch
    - !reference [.rules:child-deploy-main-tag, rules]
    - !reference [.rules:child-restart-feature, rules]

# --- RELEASE BRANCH JOBS ---

Build Embedding ST Release:
  stage: build
  image:
    name: $KANIKO_IMAGE
    entrypoint: [""]
  needs:
  - job: Fetch config
    artifacts: true
  cache:
    key: "shared-pip"
    paths:
    - .pip-cache/
    policy: pull-push
  before_script:
  - mkdir -p .pip-cache
  script:
  - source $CI_PROJECT_DIR/config.env
  - mkdir -p /kaniko/.docker
  - |
    REGISTRY_AUTH=$(printf "%s:%s" "${CI_REGISTRY_USERNAME}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')
    DOCKERHUB_AUTH=$(printf "%s:%s" "${DOCKER_HUB_USER}" "${DOCKER_HUB_PASSWORD}" | base64 | tr -d '\n')
    printf '{"auths":{"registry.smc.it:49083":{"auth":"%s"},"https://index.docker.io/v1/":{"auth":"%s"}}}' \
      "${REGISTRY_AUTH}" "${DOCKERHUB_AUTH}" > /kaniko/.docker/config.json
  - |
    KANIKO_CACHE_FLAGS="--cache=true --cache-repo=kaniko-cache-registry.openk9.io/kaniko-cache --cache-ttl=72h --snapshot-mode=redo --compressed-caching=false"
    KANIKO_CONTEXT="--context ${CI_PROJECT_DIR}/ai-packages/embedding-modules --dockerfile ${CI_PROJECT_DIR}/ai-packages/embedding-modules/Dockerfile.sentence_transformer"

    if [ -n "$CI_COMMIT_TAG" ]; then
      echo "[ST Release] Tag: push $VERSION"
      /kaniko/executor $KANIKO_CACHE_FLAGS $KANIKO_CONTEXT \
        --destination "${CI_REGISTRY_NAME}/openk9/openk9-sentence-transformers-module:$VERSION"
    else
      SNAP_TAG="${VERSION}"
      echo "[ST Release] Branch: push $SNAP_TAG"
      /kaniko/executor $KANIKO_CACHE_FLAGS $KANIKO_CONTEXT \
        --destination "${CI_REGISTRY_NAME}/openk9/openk9-sentence-transformers-module:$SNAP_TAG"
    fi
  rules:
    - !reference [.rules:child-deploy-release, rules]

