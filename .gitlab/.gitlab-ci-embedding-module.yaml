###################### EMBEDDING MODULE CHILD PIPELINE ######################
include:
  - local: '/.gitlab/.gitlab-templates.yaml'
  # NEW: Include standardized child rules
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- build
- container-scanning
- restart
variables:
  KANIKO_IMAGE: "gcr.io/kaniko-project/executor:v1.23.2-debug"
# Fetch Config  #
#################
Fetch config:
  stage: build
  image: alpine:3.16
  script:
  - apk add --no-cache grep
  - VERSION=$(grep '^OPENK9_VERSION=' python_modules_config.txt | cut -d '=' -f2)
  # Extract PYTHON_BASE_DOCKER_IMAGE value from config file
  - PYTHON_BASE_DOCKER_IMAGE=$(grep '^PYTHON_BASE_DOCKER_IMAGE=' python_modules_config.txt | cut -d '=' -f2)
  # Write results to .env file
  - echo "VERSION=$VERSION" > "$CI_PROJECT_DIR/config.env"
  - echo "PYTHON_BASE_DOCKER_IMAGE=$PYTHON_BASE_DOCKER_IMAGE" >> "$CI_PROJECT_DIR/config.env"
  artifacts:
    paths:
    - config.env
    expire_in: 1 day
  rules:
    # Always run if triggered
    - !reference [.rules:child-build-always, rules]

######################## BUILD EMBEDDING ST IMAGE (KANIKO) ########################
Build Embedding ST:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [ "" ]
  needs:
  - job: Fetch config
    artifacts: true
  cache:
    key: "embedding-modules-st-${CI_COMMIT_REF_SLUG}"
    paths:
    - .pip-cache/
    policy: pull-push
    when: always
  before_script:
  - mkdir -p .pip-cache
  script:
  - source $CI_PROJECT_DIR/config.env
  - echo "=== Configuring Kaniko credentials ==="
  - mkdir -p /kaniko/.docker
  - |
    echo "{\"auths\":{\"registry.smc.it:49083\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USERNAME}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" \
    > /kaniko/.docker/config.json
  - |
    if [ "$CI_COMMIT_BRANCH" = "main" ] || [ -n "$CI_COMMIT_TAG" ]; then
      echo "[ST] Build & push as :$VERSION"
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}/ai-packages/embedding-modules" \
        --dockerfile "${CI_PROJECT_DIR}/ai-packages/embedding-modules/Dockerfile" \
        --destination "${CI_REGISTRY_NAME}/openk9/sentence-transformers-module:$VERSION" \
        --cache=true \
        --cache-repo="${CI_REGISTRY_NAME}/openk9/sentence-transformers-module-cache"
    elif [ -n "$CI_MERGE_REQUEST_IID" ] || [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then
      echo "[ST] Build & push as :merge-request"
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}/ai-packages/embedding-modules" \
        --dockerfile "${CI_PROJECT_DIR}/ai-packages/embedding-modules/Dockerfile" \
        --destination "${CI_REGISTRY_NAME}/openk9/sentence-transformers-module:$VERSION" \
        --cache=true \
        --cache-repo="${CI_REGISTRY_NAME}/openk9/sentence-transformers-module-cache"
    elif echo "$CI_COMMIT_BRANCH" | grep -qE '^[0-9]+-.*$'; then
      echo "[ST] Feature branch => build & push :997-SNAPSHOT"
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}/ai-packages/embedding-modules" \
        --dockerfile "${CI_PROJECT_DIR}/ai-packages/embedding-modules/Dockerfile" \
        --destination "${CI_REGISTRY_NAME}/openk9/sentence-transformers-module:997-SNAPSHOT" \
        --cache=true \
        --cache-repo="${CI_REGISTRY_NAME}/openk9/sentence-transformers-module-cache"
    fi
  rules:
    # Always run build if parent triggered us
    - !reference [.rules:child-build-always, rules]

