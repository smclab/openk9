###################### EMBEDDING MODULE CHILD PIPELINE — RELEASE BRANCH ######################
# Builds only the OpenAI image (Dockerfile.base). The sentence-transformers
# image is intentionally NOT built on 3.0.x.
include:
  - local: '/.gitlab/.gitlab-templates.yaml'
  - local: '/.gitlab/ci/child-rules.yaml'

stages:
- build
- build-verifier
- container-scanning
- restart
- push

variables:
  KANIKO_IMAGE: "gcr.io/kaniko-project/executor:v1.23.2-debug"

#################
# Fetch Config  #
#################
Fetch config:
  stage: build
  image: alpine:3.16
  script:
  - apk add --no-cache grep
  - VERSION=$(grep '^OPENK9_VERSION=' python_modules_config.txt | cut -d '=' -f2)
  - PYTHON_BASE_DOCKER_IMAGE=$(grep '^PYTHON_BASE_DOCKER_IMAGE=' python_modules_config.txt | cut -d '=' -f2)
  - echo "VERSION=$VERSION" > "$CI_PROJECT_DIR/config.env"
  - echo "PYTHON_BASE_DOCKER_IMAGE=$PYTHON_BASE_DOCKER_IMAGE" >> "$CI_PROJECT_DIR/config.env"
  artifacts:
    paths:
    - config.env
    expire_in: 1 day
  rules:
    - !reference [.rules:child-build-always, rules]

######################## BUILD EMBEDDING OPENAI RELEASE (KANIKO) ########################
Build Embedding OpenAI Release:
  stage: build
  image:
    name: $KANIKO_IMAGE
    entrypoint: [""]
  needs:
  - job: Fetch config
    artifacts: true
  cache:
    key: "shared-pip"
    paths:
    - .pip-cache/
    policy: pull-push
  before_script:
  - mkdir -p .pip-cache
  script:
  - source $CI_PROJECT_DIR/config.env
  - mkdir -p /kaniko/.docker
  - |
    REGISTRY_AUTH=$(printf "%s:%s" "${CI_REGISTRY_USERNAME}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')
    DOCKERHUB_AUTH=$(printf "%s:%s" "${DOCKER_HUB_USER}" "${DOCKER_HUB_PASSWORD}" | base64 | tr -d '\n')
    printf '{"auths":{"registry.smc.it:49083":{"auth":"%s"},"https://index.docker.io/v1/":{"auth":"%s"}}}' \
      "${REGISTRY_AUTH}" "${DOCKERHUB_AUTH}" > /kaniko/.docker/config.json
  - |
    KANIKO_CACHE_FLAGS="--cache=true --cache-repo=kaniko-cache-registry.openk9.io/kaniko-cache --cache-ttl=72h --snapshot-mode=redo --compressed-caching=false"
    KANIKO_CONTEXT="--context ${CI_PROJECT_DIR}/ai-packages/embedding-modules --dockerfile ${CI_PROJECT_DIR}/ai-packages/embedding-modules/Dockerfile.base"

    if [ -n "$CI_COMMIT_TAG" ]; then
      IMAGE_TAG="$CI_COMMIT_TAG"
      echo "[OA Release] Tag: push $IMAGE_TAG"
    else
      IMAGE_TAG="$VERSION"
      echo "[OA Release] Branch: push $IMAGE_TAG"
    fi

    /kaniko/executor $KANIKO_CACHE_FLAGS $KANIKO_CONTEXT \
      --destination "${CI_REGISTRY_NAME}/openk9/openk9-openai-module:$IMAGE_TAG"
  rules:
    - !reference [.rules:child-build-release, rules]

######################## BUILD VERIFIER EMBEDDING ########################
Build Verifier Embedding:
  stage: build-verifier
  image: python:3.12-slim
  script:
  - echo "=== Python syntax check for embedding-modules ==="
  - find ai-packages/embedding-modules -name "*.py" -not -path "*/__pycache__/*" | xargs python3 -m py_compile
  - echo "=== Syntax check passed ==="
  rules:
    - !reference [.rules:child-verify-release-mr, rules]
    - !reference [.rules:child-verify-porting-push, rules]

######################## CONTAINER SCANNING EMBEDDING (push 3.0.x only) ########################
Container Scanning Embedding OpenAI:
  extends: .container-scanning-template
  needs:
  - job: Fetch config
    artifacts: true
  - job: Build Embedding OpenAI Release
    artifacts: false
  variables:
    REGISTRY_COMPONENT_NAME: "openk9-openai-module"
  rules:
    - !reference [.rules:child-restart-release, rules]

######################## TRIGGER RESTART EMBEDDING (push 3.0.x only) ########################
Trigger Restart Embedding Release:
  extends: .restart_job_template
  variables:
    COMPONENT_NAME: "embedding-module"
    COMPONENT_TYPE: "ai"
    TARGET_ENV: "k9-stable-2"
  needs:
  - job: Fetch config
    artifacts: true
  - job: Build Embedding OpenAI Release
    artifacts: false
  rules:
    - !reference [.rules:child-restart-release, rules]

######################## COPY TO DOCKER HUB (tag only) ########################
Copy Embedding OpenAI to DockerHub:
  extends: .skopeo-copy-to-dockerhub
  variables:
    REGISTRY_COMPONENT_NAME: "openk9-openai-module"
  needs:
    - job: Fetch config
      artifacts: true
    - job: Build Embedding OpenAI Release
      artifacts: false
  rules:
    - !reference [.rules:child-skopeo-release, rules]
