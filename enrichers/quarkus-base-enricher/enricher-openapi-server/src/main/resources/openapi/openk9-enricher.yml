openapi: 3.0.1
info:
  title: openk9-enricher
  version: 1.0.0-SNAPSHOT
paths:
  /health:
    get:
      tags:
        - Health API
      description: Ask the enricher's health status
      operationId: health
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                $ref: "#/components/schemas/Health"
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
  /form:
    get:
      tags:
        - Form API
      description: Ask the enricher for the specifications that can be configured by OpenK9
      operationId: form
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                $ref: "#/components/schemas/Form"
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
  /process:
    post:
      tags:
        - Enricher API
      description: Invoke the enricher to start the process of data enrichment
      operationId: process
      requestBody:
        required: true
        content:
          'application/json':
            schema:
              $ref: "#/components/schemas/OpenK9Input"
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                $ref: "#/components/schemas/ProcessResponseDTO"
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
components:
  schemas:
    Health:
      type: object
      properties:
        status:
          type: string
          enum: [ "UP", "DOWN" ]
    Form:
      type: object
      properties:
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FormField"
    FormField:
      type: object
      properties:
        info:
          type: string
        label:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [ 'text', 'number', 'select', 'multiselect', 'list', 'date', 'email', 'password', 'time', 'url', 'checkbox', 'stringMap' ]
        size:
          type: number
        required:
          type: boolean
        values:
          type: array
          items:
            $ref: "#/components/schemas/FieldValue"
        validator:
          type: object
          $ref: "#/components/schemas/FormFieldValidator"
    FieldValue:
      type: object
      properties:
        value: { }
        isDefault:
          type: boolean
    FormFieldValidator:
      type: object
      properties:
        min:
          type: integer
          format: int64
        max:
          type: integer
          format: int64
        regex:
          type: string
    ProcessResponseDTO:
      type: object
      properties:
        payload:
          x-java-type: "java.lang.Object"
    OpenK9Input:
      type: object
      properties:
        payload:
          type: object
          description: Contains a map of data to enrich.
          additionalProperties: { }
        enrichItemConfig:
          type: object
          description: Defines the configuration needed to use the enricher.
          additionalProperties: { }
        replyTo:
          type: string
          description: The token needed to callback OpenK9.