services:
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9090"
    ports:
      - "9000:9000"
      - "9090:9090"
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
    volumes:
      - minio-data:/data
  file-manager:
    image: ${IMAGE_GROUP:-openk9}/openk9-file-manager:${IMAGE_TAG:-2026.1.0-SNAPSHOT}
    container_name: openk9-file-manager
    hostname: openk9-file-manager
    environment:
      QUARKUS_HTTP_ACCESS_LOG_ENABLED: 'true'
      QUARKUS_HTTP_ACCESS_LOG_PATTERN: '%h %l %u %t "%r" %s %b %D'
      QUARKUS_HTTP_LIMITS_MAX_BODY_SIZE: '10240K'
      QUARKUS_OTEL_SDK_DISABLED: 'true'
      QUARKUS_LOG_CONSOLE_JSON: 'false'
      QUARKUS_MINIO_ACCESS_KEY: 'minio'
      QUARKUS_MINIO_SECRET_KEY: 'minio123'
      QUARKUS_MINIO_SECURE: 'false'
      QUARKUS_MINIO_HOST: 'http://minio:9000'
      QUARKUS_GRPC_CLIENTS__FILEMANAGER__HOST: 'openk9-datasource'
    healthcheck:
      test: "curl --silent --fail http://localhost:8080/q/health"
      interval: 10s
      timeout: 10s
      retries: 10
  tika:
    image: ${IMAGE_GROUP:-openk9}/openk9-tika:${IMAGE_TAG:-2026.1.0-SNAPSHOT}
    container_name: openk9-tika
    hostname: openk9-tika
    environment:
      QUARKUS_HTTP_ACCESS_LOG_ENABLED: 'true'
      QUARKUS_HTTP_ACCESS_LOG_PATTERN: '%h %l %u %t "%r" %s %b %D'
      QUARKUS_HTTP_LIMITS_MAX_BODY_SIZE: '10240K'
      QUARKUS_OTEL_SDK_DISABLED: 'true'
      QUARKUS_LOG_CONSOLE_JSON: 'false'
      OPENK9_TIKA_OCR_CHARACTER_LENGTH: '10'
      OPENK9_TIKA_OCR_ENABLED: 'true'
      OPENK9_TIKA_POOL_SIZE: '1'
      QUARKUS_REST_CLIENT_DATASOURCE_URL: 'http://openk9-datasource:8080'
      QUARKUS_REST_CLIENT_FILE_MANAGER_URL: 'http://openk9-file-manager:8080'
    healthcheck:
      test: "curl --silent --fail http://localhost:8080/q/health"
      interval: 10s
      timeout: 10s
      retries: 10
  minio-connector:
    image: ${IMAGE_GROUP:-openk9}/openk9-minio-connector:${IMAGE_TAG:-2026.1.0-SNAPSHOT}
    container_name: openk9-minio-connector
    hostname: openk9-minio-connector
    ports:
      - "5002:5000"
  docling-processor:
    image: ${IMAGE_GROUP:-openk9}/openk9-docling-processor:${IMAGE_TAG:-2026.1.0-SNAPSHOT}
    container_name: openk9-docling-processor
    hostname: openk9-docling-processor
    environment:
      FILE_MANAGER_HOST: 'http://openk9-file-manager:8080'
      DATASOURCE_HOST: 'http://openk9-datasource:8080'
    depends_on:
      file-manager:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/health\", timeout=2)'"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  minio-data:
