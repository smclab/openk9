version: "3.5"
services:
    minio-connector:
        build:
            context: .
        image: minio-connector:latest
        container_name: minio-connector
        ports:
            - "5000:5000"
        environment:
            - INPUT_LOG_LEVEL=INFO
        healthcheck:
            test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5)"]
            interval: 30s
            timeout: 10s
            retries: 3
    minio:
        image: minio/minio:latest
        hostname: minio-connector-data
        command: server /data --console-address ":9090"
        ports:
            - "9000:9000"
            - "9090:9090"
        environment:
            - MINIO_ROOT_USER=minio
            - MINIO_ROOT_PASSWORD=minio123
        volumes:
            - minio-connector-data:/data

volumes:
    minio-connector-data: