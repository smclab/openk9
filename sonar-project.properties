# =============================================
# SonarQube Project Configuration — OpenK9
# =============================================

# Unique project key on the SonarQube instance
sonar.projectKey=openk9
sonar.projectName=OpenK9

# Source encoding
sonar.sourceEncoding=UTF-8

# Java backend sources (relative to repo root)
sonar.sources=core/app,core/common,core/client,core/api

# Exclude tests, generated code, vendor and build artifacts
sonar.exclusions=\
  **/test/**,\
  **/vendor/**,\
  **/*_pb2*.py,\
  **/target/**,\
  **/*.xml,\
  **/node_modules/**

# sonar-scanner-cli does not have compiled bytecode available.
# /tmp/empty is created in the job before_script as a workaround
# to suppress the "No binary directories defined" error.
# For full bytecode analysis, switch to: mvn sonar:sonar
sonar.java.binaries=/tmp/empty